<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F3EA">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22MY%20WALK%22%2C%22short_name%22%3A%22MY%20WALK%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F7F3EA%22%2C%22theme_color%22%3A%22%23F7F3EA%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon-180.png%22%2C%22sizes%22%3A%22180x180%22%2C%22type%22%3A%22image/png%22%7D%5D%7D">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20fill%3D%27%23F7F3EA%27/%3E%3Ctext%20x%3D%2716%27%20y%3D%2723%27%20font-family%3D%27Georgia%2Cserif%27%20font-weight%3D%27700%27%20font-size%3D%2720%27%20fill%3D%27%232D4C73%27%20text-anchor%3D%27middle%27%3EW%3C/text%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-title" content="MY WALK">
<title>MY WALK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F2EA; --bg2:#F7F5F2; --card:#FCFAF7; --tint:#EEF4FA;
  --blue:#2D4C73; --blue2:#476C9B;
  --gold:#D4AF37; --goldsoft:#E5CE8A;
  --text:#202124; --text2:#666A73; --div:#E8E3D9; --div2:#F0EBDF;
  --accent:var(--blue); --accent2:var(--blue2);
}
body.wing-devo{--accent:#2D4C73;--accent2:#476C9B}
body.wing-prayer{--accent:#3A5A85;--accent2:#5A7BA6}
body.wing-study{--accent:#35608F;--accent2:#5480AC}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);background-attachment:fixed;color:var(--text);font-family:"Inter",-apple-system,sans-serif;font-size:16px;line-height:1.6;min-height:100vh;padding-bottom:calc(78px + env(safe-area-inset-bottom))}
#app{max-width:640px;margin:0 auto;padding:16px 18px 28px;position:relative}
a{color:var(--blue2);text-decoration:none}
button{font-family:"Inter",sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:"Inter",sans-serif;font-size:16px;color:var(--text);background:var(--card);border:1px solid var(--div);border-radius:10px;padding:11px 13px;width:100%}
input::placeholder,textarea::placeholder{color:var(--text2)}
input:focus,textarea:focus,select:focus,button:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--blue2);outline-offset:2px}
h1,h2,h3{font-family:"Playfair Display",serif;font-weight:600;color:var(--text);letter-spacing:.005em}
.eyebrow{font-family:"Inter",sans-serif;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
/* ---- cards: white paper, spacing over shadow ---- */
.card{background:var(--card);border:1px solid var(--div);border-radius:14px;padding:18px;margin:14px 0;position:relative;box-shadow:0 1px 2px rgba(32,33,36,.04)}
.card.tap{cursor:pointer}
.card.tap:active{background:#FCFAF4}
.rule{height:11px;border:none;margin:12px 0;position:relative;background:none}
.rule::before{content:"";position:absolute;top:5px;left:0;right:0;height:1px;background:var(--div)}
.rule::after{content:"✦";position:absolute;top:0;left:50%;transform:translateX(-50%);color:var(--gold);font-size:9px;line-height:11px;background:var(--card);padding:0 8px}
/* ---- hero: quiet photo date card ---- */
.hero{border:none;border-radius:16px;overflow:hidden;position:relative;margin:16px 0;box-shadow:0 2px 8px rgba(32,33,36,.08)}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#B9C9DC 0%,#8FA6C2 70%);background-size:cover;background-position:center}
.hero-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,32,50,.08) 0%,rgba(20,32,50,.62) 85%)}
.hero-in{position:relative;padding:24px 20px 18px;min-height:230px;display:flex;flex-direction:column;justify-content:flex-end}
.hero-frame{display:none}
.hero .c3,.hero .c4{display:none}
.hero-date{font-family:"Inter",sans-serif;font-weight:600;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--goldsoft);margin-bottom:9px}
.hero-verse{font-family:"Playfair Display",serif;font-size:20px;line-height:1.5;font-style:italic;color:#fff;text-shadow:0 1px 10px rgba(10,20,35,.5)}
.hero-verse::first-letter{font-size:inherit;float:none;margin:0}
.hero-ref{font-family:"Inter",sans-serif;font-weight:600;font-size:12px;color:#E8EEF6;margin-top:8px;letter-spacing:.1em;text-transform:uppercase}
.hero-story{margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,.28);font-family:"Inter",sans-serif;font-weight:500;font-size:13.5px;color:#F0F4F9;letter-spacing:.02em}
.greet{font-family:"Playfair Display",serif;font-size:27px;font-weight:600;color:var(--text);margin:10px 2px 0}
/* ---- home rows ---- */
.hcard{display:flex;align-items:center;gap:14px}
.hcard .ic{width:40px;height:40px;flex:0 0 40px;border:none;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:17px;background:var(--tint)}
.hcard .bd{flex:1;min-width:0}
.hcard .t1{font-family:"Inter",sans-serif;font-weight:600;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--text2);margin-bottom:2px}
.hcard .t2{font-family:"Inter",sans-serif;font-weight:500;font-size:16.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard .t3{font-size:13.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard .go{color:#C4BCA9;font-size:19px}
/* ---- nav ---- */
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);border-top:1px solid var(--div)}
nav button{flex:1;padding:11px 0 9px;font-size:10.5px;font-weight:500;letter-spacing:.06em;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
nav button .nic{width:24px;height:24px}
nav button.on{color:var(--accent)}
nav button.on::after{content:"";position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
/* ---- sections ---- */
.pagehead{display:flex;align-items:baseline;justify-content:space-between;margin:12px 2px 4px}
.pagehead h1{font-size:28px;font-weight:700}
.tabs{display:flex;gap:8px;margin:14px 0 6px}
.tabs button{flex:1;font-size:13px;font-weight:600;padding:10px 0;border:1px solid var(--div);border-radius:10px;color:var(--text2);background:var(--card)}
.tabs button.on{border-color:var(--accent);color:#fff;background:var(--accent)}
.btn{display:inline-block;font-size:13.5px;font-weight:600;border:1.5px solid var(--accent);color:var(--accent);border-radius:10px;padding:11px 18px;letter-spacing:.02em}
.btn:active{background:var(--tint)}
.btn.solid{background:var(--accent);color:#fff}
.btn.ghost{border-color:var(--div);color:var(--text2)}
.btn.sm{padding:7px 12px;font-size:12px}
.btnrow{display:flex;gap:9px;flex-wrap:wrap;margin:12px 0}
/* scripture: quiet tinted reading panel, gold marker */
.scripture{background:var(--tint);color:var(--text);border:none;border-radius:12px;padding:17px 18px;font-family:"Playfair Display",serif;font-style:italic;font-size:18.5px;line-height:1.62;box-shadow:none;position:relative}
.scripture::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:2px;background:var(--gold);border-radius:2px}
.scripture .ref{font-family:"Inter",sans-serif;font-style:normal;font-weight:600;font-size:11.5px;color:var(--blue);display:block;margin-top:10px;letter-spacing:.12em;text-transform:uppercase}
.naves{white-space:pre-wrap;font-size:14.5px;line-height:1.65;color:var(--text);font-family:"Inter",sans-serif}
.naves a{border-bottom:1px solid #CBD9EA;color:var(--blue2)}
.reflink{border-bottom:1px solid #CBD9EA;color:var(--blue2)}
.check{width:26px;height:26px;flex:0 0 26px;border:1.5px solid var(--blue2);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:transparent;font-size:15px}
.check.on{background:var(--accent);border-color:var(--accent);color:#fff}
.row{display:flex;align-items:center;gap:11px}
.grow{flex:1;min-width:0}
.small{font-size:13.5px;color:var(--text2)}
.tiny{font-size:12px;color:var(--text2)}
.right{text-align:right}
.center{text-align:center}
.mt{margin-top:12px}.mb{margin-bottom:12px}
/* calendar — gold reserved for today */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.cal .d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13.5px;color:#B9B2A0;border:1px solid transparent}
.cal .d.has{color:var(--text);border-color:var(--div)}
.cal .d.read{background:var(--accent);color:#fff;font-weight:600;border-color:var(--accent)}
.cal .d.today{outline:2px solid var(--gold);outline-offset:-1px}
.cal .hd{font-family:"Inter",sans-serif;font-weight:600;font-size:10px;letter-spacing:.08em;color:var(--text2);text-align:center}
/* hymn */
.hymn-v{margin:16px 0;font-family:"Playfair Display",serif;font-style:italic;font-size:18px;line-height:1.66;white-space:pre-line;color:var(--text)}
.hymn-c{margin:16px 0;padding:13px 16px;border-left:2px solid var(--gold);font-family:"Playfair Display",serif;font-style:italic;white-space:pre-line;color:var(--blue);background:var(--tint);border-radius:0 10px 10px 0}
.vnum{font-family:"Inter",sans-serif;font-style:normal;font-weight:600;font-size:11px;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.13em;text-transform:uppercase}
/* flash card */
.flash{border:1px solid var(--div);border-radius:16px;background:var(--card);padding:28px 22px;min-height:300px;display:flex;flex-direction:column;box-shadow:0 2px 10px rgba(32,33,36,.06)}
.flash .fh{font-family:"Inter",sans-serif;font-weight:600;font-size:11.5px;color:var(--text2);letter-spacing:.14em;text-transform:uppercase}
.flash .fn{font-family:"Playfair Display",serif;font-size:28px;font-weight:600;color:var(--text);margin:10px 0 4px}
.flash ul{list-style:none;margin-top:10px}
.flash li{padding:9px 0;border-bottom:1px solid var(--div2);font-size:16px}
.prog{font-family:"Inter",sans-serif;font-weight:600;font-size:12px;letter-spacing:.1em;color:var(--text2);text-transform:uppercase}
/* memory practice */
.mem-w{display:inline-block;margin:0 4px 8px 0;padding:3px 9px;border-radius:8px;background:var(--tint);color:var(--text);font-family:"Playfair Display",serif;font-size:17.5px;cursor:pointer;user-select:none}
.mem-w.hid{background:var(--card);color:transparent;border:1px dashed var(--div);box-shadow:none}
/* character medallion */
.medal{width:88px;height:88px;border-radius:50%;border:1.5px solid var(--blue2);margin:0 auto;display:flex;align-items:center;justify-content:center;background:var(--tint);box-shadow:none}
.medal svg{width:50px;height:50px;stroke:var(--blue);fill:none;stroke-width:1.4}
/* lists */
.li{display:flex;align-items:center;gap:11px;padding:13px 2px;border-bottom:1px solid var(--div2)}
.li:last-child{border-bottom:none}
.pill{font-family:"Inter",sans-serif;font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:99px;padding:3px 10px;color:var(--blue);background:var(--tint)}
.iconb{font-size:16px;color:#B9B2A0;padding:6px 8px}
.modal{position:fixed;inset:0;background:rgba(32,33,36,.35);z-index:90;display:flex;align-items:flex-end;justify-content:center}
.modal .mbox{background:var(--card);border:none;border-radius:18px 18px 0 0;max-width:640px;width:100%;max-height:86vh;overflow:auto;padding:24px 18px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -6px 30px rgba(32,33,36,.18)}
.searchwrap{position:sticky;top:-24px;background:var(--card);padding:4px 0 10px;z-index:2}
details summary{cursor:pointer;font-family:"Inter",sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);padding:8px 0;list-style:none}

body.wing-home .gear{display:none}
.gear{position:fixed;top:12px;right:max(16px,calc(50vw - 320px + 16px));z-index:60;width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--div);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:19px;box-shadow:0 1px 3px rgba(32,33,36,.08)}
.gear:active{background:var(--tint)}
.sheet-h{font-family:"Playfair Display",serif;font-weight:700;font-size:24px;color:var(--text);margin-bottom:2px}
.sset{background:var(--tint);border-radius:12px;padding:2px 0;margin-top:14px}
.sset .li{padding:13px 15px;border-color:rgba(45,76,115,.10)}
.sset .k{font-size:13px;color:var(--text2)}
.sset .v{font-family:"Inter",sans-serif;font-weight:600;font-size:15px;color:var(--text)}
.sfoot{font-size:11.5px;color:var(--text2);text-align:center;margin-top:16px;letter-spacing:.04em}

.bookmark{position:absolute;top:0;right:18px;width:22px;height:30px;background:var(--gold);clip-path:polygon(0 0,100% 0,100% 100%,50% 82%,0 100%)}
.mvtext{font-family:"Playfair Display",serif;font-style:italic;font-size:19px;line-height:1.5;color:var(--text)}
.mvref{font-family:"Inter",sans-serif;font-weight:600;font-size:11.5px;color:var(--blue);margin-top:8px;letter-spacing:.1em;text-transform:uppercase}
.linkbtn{font-family:"Inter",sans-serif;font-weight:600;font-size:13.5px;color:var(--accent);letter-spacing:.02em}
.rtitle{font-family:"Playfair Display",serif;font-weight:600;font-size:19px;color:var(--text);margin:2px 0 2px}
.rblurb{font-size:14.5px;color:var(--text2);line-height:1.55}
.markbtn{flex:0 0 auto;font-family:"Inter",sans-serif;font-weight:600;font-size:12.5px;border:1.5px solid var(--div);color:var(--text2);border-radius:10px;padding:11px 13px}
.markbtn.on{border-color:var(--accent);color:var(--accent);background:var(--tint)}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:14px 0}
.tile{background:var(--card);border:1px solid var(--div);border-radius:14px;padding:15px 8px 13px;text-align:center;box-shadow:0 1px 2px rgba(32,33,36,.04)}
.tile .tlabel{font-family:"Inter",sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.tile .tnum{font-family:"Playfair Display",serif;font-weight:700;font-size:30px;color:var(--text);line-height:1.15;margin-top:4px}
.tile .tnum.gold{color:var(--gold)}
.tile .tsub{font-size:12px;color:var(--text2)}
.mring{width:52px;height:52px;margin:2px auto 0;display:block}
.journey .jtext{font-size:15px;color:var(--text);margin-top:3px}
.journey .jflag{font-size:20px;opacity:.8}
.jbar{height:8px;border-radius:99px;background:var(--tint);overflow:hidden}
.jbar span{display:block;height:100%;background:linear-gradient(90deg,var(--blue2),var(--blue));border-radius:99px}

.subtabs{display:flex;gap:8px;margin:14px 0 6px;overflow-x:auto}
.subtabs button{flex:1;white-space:nowrap;font-size:12.5px;font-weight:600;padding:10px 12px;border:1px solid var(--div);border-radius:10px;color:var(--text2);background:var(--card)}
.subtabs button.on{border-color:var(--accent);color:#fff;background:var(--accent)}
.pstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-items:end;text-align:center}
.pcol{display:flex;flex-direction:column;align-items:center;gap:5px}
.pflame{font-family:"Playfair Display",serif;font-weight:700;font-size:26px;color:var(--gold)}
.pdays{font-family:"Playfair Display",serif;font-weight:700;font-size:26px;color:var(--text)}
.pdays span{font-family:"Inter",sans-serif;font-weight:400;font-size:13px;color:var(--text2)}
.pring{width:56px;height:56px;display:block}
.plabel{font-size:11px;color:var(--text2)}
.playb{flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:var(--tint);color:var(--accent);font-size:12px;display:flex;align-items:center;justify-content:center}
.check.sm{width:22px;height:22px;flex:0 0 22px;font-size:13px}
.cal .d{position:relative}
.cdot{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue2)}
.cal .d.sel{border-color:var(--blue2);background:var(--tint)}
.cal .d.read .cdot{display:none}

.amen{font-family:"Playfair Display",serif;font-weight:600;font-size:26px;color:var(--blue)}
.prayline{font-size:16px;color:var(--text);margin-top:3px}
.prayline b{font-family:"Playfair Display",serif;font-size:22px;color:var(--text)}
.fverse{margin-top:14px;padding-top:12px;border-top:1px solid var(--div2);font-family:"Playfair Display",serif;font-style:italic;font-size:15px;color:var(--text2)}
.fvref{display:block;font-family:"Inter",sans-serif;font-style:normal;font-weight:600;font-size:11px;color:var(--blue);margin-top:6px;letter-spacing:.1em;text-transform:uppercase}
.prayrow{display:flex;align-items:flex-start;justify-content:space-around;gap:10px;margin-top:6px}
.circ{display:flex;flex-direction:column;align-items:center;gap:7px}
.cg{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.cg.ghost{border:1.5px solid var(--div);color:var(--text2)}
.cg.solid{background:var(--accent);color:#fff;width:60px;height:60px;font-size:24px}
.cl{font-size:11px;font-weight:600;color:var(--text2)}
.star{color:var(--gold);font-size:18px}

.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin:14px 0}
.gtile{background:var(--card);border:1px solid var(--div);border-radius:14px;padding:16px 14px;cursor:pointer;box-shadow:0 1px 2px rgba(32,33,36,.04)}
.gtile:active{background:#FCFAF4}
.gt-ic{font-size:22px}
.gt-t{font-family:"Playfair Display",serif;font-weight:600;font-size:16px;margin-top:6px}
.gt-s{font-size:12.5px;color:var(--text2)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:"Inter",sans-serif;font-weight:600;font-size:12.5px;padding:7px 13px;border-radius:99px;background:var(--tint);color:var(--blue);border:none}
.chip:active{background:#E2ECF6}
.searchbar input{background:var(--card);border:1px solid var(--div);font-size:15px;padding:12px 14px}

nav button .nic{width:24px;height:24px}
.ic-svg{width:24px;height:24px;display:block}
nav button.on .nic{stroke-width:2.1}

/* home header */
.homehead{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 2px;margin-bottom:8px}
.hicon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.hicon .ic-svg{width:22px;height:22px}
.greet-c{text-align:center;line-height:1.15}
.greet-sm{font-family:"Playfair Display",serif;font-size:19px;color:var(--text2)}
.greet-lg{font-family:"Playfair Display",serif;font-weight:700;font-size:24px;color:var(--text)}
/* hero */
.hero2{border-radius:18px;overflow:hidden;position:relative;height:184px;box-shadow:0 4px 16px rgba(32,33,36,.06)}
.hero2-bg{position:absolute;inset:0;background:linear-gradient(160deg,#C4D2E2,#9DB3CC);background-size:cover;background-position:center}
.hero2-date{position:absolute;left:18px;bottom:16px;font-family:"Inter",sans-serif;font-weight:600;font-size:11px;letter-spacing:.16em;color:#fff;text-shadow:0 1px 6px rgba(10,20,35,.5)}
/* memory verse overlap card */
.mvcard{position:relative;z-index:2;text-align:left;box-shadow:0 4px 16px rgba(32,33,36,.08)}
.ribbon{position:absolute;top:-2px;right:18px;color:var(--gold)}
.ribbon .ic-svg{width:22px;height:30px;fill:var(--gold);stroke:var(--gold)}
.mv2{font-family:"Playfair Display",serif;font-style:italic;font-size:18px;line-height:1.5;color:var(--text);text-align:center;margin-top:6px}
.mvcard .mvref{text-align:center;margin-top:8px}
.tbtn{font-family:"Inter",sans-serif;font-weight:600;font-size:13px;color:var(--blue);display:inline-flex;align-items:center;gap:3px}
.tbtn .chev{width:15px;height:15px}
.tbtn .ic-svg{width:15px;height:15px}
/* generic bits */
.lbl{font-family:"Inter",sans-serif;font-weight:600;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--text2)}
.serif-t{font-family:"Playfair Display",serif;font-weight:600;font-size:18px;color:var(--text);margin:2px 0 2px;line-height:1.25}
.meta{font-family:"Inter",sans-serif;font-size:13px;color:var(--text2)}
.summary{font-size:14px;line-height:1.55;color:var(--text2)}
.sq{width:38px;height:38px;flex:0 0 38px;border-radius:11px;background:var(--tint);display:flex;align-items:center;justify-content:center;color:var(--blue)}
.sq .ic-svg{width:20px;height:20px}
.mt2{margin-top:14px}.mt-s{margin-top:6px}
.pbtn{font-family:"Inter",sans-serif;font-weight:600;font-size:14px;background:var(--blue);color:#fff;border-radius:11px;padding:12px 16px;text-align:center}
.pbtn:active{background:#26405f}
.markpill{font-family:"Inter",sans-serif;font-weight:600;font-size:13px;border:1px solid var(--div);color:var(--text2);border-radius:11px;padding:12px 14px;display:inline-flex;align-items:center;gap:5px;flex:0 0 auto}
.markpill.on{border-color:var(--blue);color:var(--blue);background:var(--tint)}
.markpill .chk,.markpill .ic-svg{width:15px;height:15px}
.chev{color:#C4BCA9}
.chev .ic-svg,.chev.ic-svg{width:18px;height:18px}
/* metrics */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.metric{background:var(--card);border:1px solid var(--div);border-radius:16px;padding:14px 8px 12px;text-align:center;box-shadow:0 4px 16px rgba(32,33,36,.05);display:flex;flex-direction:column;align-items:center;gap:2px}
.m-ic{color:var(--blue)}.m-ic.gold{color:var(--gold)}
.m-ic .ic-svg{width:20px;height:20px}
.m-num{font-family:"Playfair Display",serif;font-weight:700;font-size:24px;color:var(--text);line-height:1.1}
.m-lbl{font-size:11px;color:var(--text2)}
.m-cap{font-family:"Inter",sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-top:3px}
.m-ring{height:46px;display:flex;align-items:center}
/* journey */
.journey2 .jtext2{font-size:14.5px;color:var(--text);margin-top:3px}
.journey2 .jmtn{color:var(--blue)}
.journey2 .jmtn .ic-svg{width:26px;height:26px}
.jbar2{height:7px;border-radius:99px;background:var(--tint);overflow:hidden}
.jbar2 span{display:block;height:100%;background:var(--blue);border-radius:99px}
/* timeline */
.plan-lbl{margin:18px 2px 6px}
.timeline{padding:6px 16px}
.trow{display:flex;align-items:center;gap:12px;padding:13px 0;position:relative;cursor:pointer}
.trow:not(.last)::after{content:"";position:absolute;left:8px;top:30px;bottom:-13px;width:1.5px;background:var(--div)}
.tdot{width:17px;height:17px;flex:0 0 17px;border-radius:50%;border:1.5px solid var(--div);background:var(--card);z-index:1;display:flex;align-items:center;justify-content:center;color:#fff}
.tdot.done{background:var(--blue);border-color:var(--blue)}
.tdot .tchk,.tdot .ic-svg{width:11px;height:11px}
.tico{width:22px;height:22px;color:var(--blue2);flex:0 0 22px}
.tico .ic-svg{width:22px;height:22px}
.ttitle{font-family:"Inter",sans-serif;font-weight:600;font-size:15px;color:var(--text)}
.tdesc{font-size:12.5px;color:var(--text2);margin-top:1px}
.wk-card .chev .ic-svg{width:20px;height:20px}

#heroFixed{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;height:380px;background-size:cover;background-position:center 20%;z-index:0;pointer-events:none;
  -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 22%,#000 55%,transparent 100%);
  mask-image:linear-gradient(180deg,transparent 0,#000 22%,#000 55%,transparent 100%)}
body.wing-home #app{position:relative;z-index:1}
body.wing-home .homehead{margin-bottom:6px}
.greet-orn{display:flex;align-items:center;justify-content:center;gap:8px;margin:6px 0 4px}
.greet-orn span{width:34px;height:1px;background:var(--gold);opacity:.6}
.greet-orn .orn{width:11px;height:11px;color:var(--gold);fill:var(--gold);stroke:var(--gold)}
.greet-date{font-family:"Inter",sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.05em;color:var(--gold);text-align:center}
/* memory verse card sits over hero */
.mvcard{position:relative;z-index:2;margin-top:150px;box-shadow:0 8px 24px rgba(32,33,36,.10)}
.mv2{font-family:"Playfair Display",serif;font-style:italic;font-size:19px;line-height:1.5;color:var(--text);text-align:center;margin-top:8px}
/* today's reading — precise layout */
.readcard{padding:20px}
.readhead{display:flex;align-items:flex-start;gap:13px}
.readhead .grow{min-width:0}
.readbtn{flex:0 0 auto;align-self:center;padding:11px 20px;border-radius:99px;font-size:14px}
.summary{margin-top:14px;font-size:14.5px;line-height:1.6;color:var(--text2)}
.readfoot{display:flex;justify-content:flex-end;margin-top:16px}
.marklink{font-family:"Inter",sans-serif;font-weight:600;font-size:14px;color:var(--blue);display:inline-flex;align-items:center;gap:6px}
.marklink .chk,.marklink .ic-svg{width:16px;height:16px}
.marklink.on{color:var(--blue)}
/* metrics compact, label on top */
.metric{padding:14px 8px}
.metric .m-cap{margin:0 0 6px;font-weight:700}
.metric .m-ic .ic-svg{width:22px;height:22px}
.metric .m-num{margin-top:4px}
.loading{text-align:center;color:var(--text2);padding:70px 0;font-family:"Playfair Display",serif;font-style:italic}
/* devo progress ring */
.ring{display:flex;align-items:center;gap:16px}
.ring svg{width:76px;height:76px;flex:0 0 76px}
.ring .rn{font-family:"Playfair Display",serif;font-weight:700;font-size:24px;color:var(--text)}
.ring .rl{font-size:12.5px;color:var(--text2)}
@media (prefers-reduced-motion:no-preference){
  .view{animation:fade .3s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
}
</style>
</head>

const DAY0=new Date(2026,6,2); // Jul 2 2026 = plan index 0
function todayKey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dayIndexFor(date){ const a=new Date(date.getFullYear(),date.getMonth(),date.getDate()); return Math.round((a-DAY0)/86400000); }
function dateForIndex(i){ const d=new Date(DAY0); d.setDate(d.getDate()+i); return d; }
function clampDay(i){ return Math.max(0, Math.min(D.plan.length-1, i)); }
function calendarDay(){ return clampDay(dayIndexFor(new Date())); }
function seqDay(){ for(let i=0;i<D.plan.length;i++) if(!S.reads[i]) return i; return D.plan.length-1; }
function currentDay(){ return S.seqMode ? Math.min(seqDay(), calendarDay()) : calendarDay(); }
function weekOfYear(d){ d=d||new Date(); const jan1=new Date(d.getFullYear(),0,1); return Math.min(52, Math.floor((d-jan1)/86400000/7)+1); }
function fmtDate(d){ return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function fmtShort(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function streak(){
  let n=0, i=calendarDay();
  if(!S.reads[i]) i--; // today not yet read: streak counts through yesterday
  for(; i>=0 && S.reads[i]; i--) n++;
  return n;
}

const BOOKMAP={GEN:'Genesis',EXO:'Exodus',LEV:'Leviticus',NUM:'Numbers',DEU:'Deuteronomy',JOS:'Joshua',JDG:'Judges',RUT:'Ruth','1SA':'1 Samuel','2SA':'2 Samuel','1KI':'1 Kings','2KI':'2 Kings','1CH':'1 Chronicles','2CH':'2 Chronicles',EZR:'Ezra',NEH:'Nehemiah',EST:'Esther',JOB:'Job',PSA:'Psalms',PRO:'Proverbs',ECC:'Ecclesiastes',So:'Song of Solomon',ISA:'Isaiah',JER:'Jeremiah',LAM:'Lamentations',EZK:'Ezekiel',DAN:'Daniel',HOS:'Hosea',JOL:'Joel',AMO:'Amos',OBA:'Obadiah',JON:'Jonah',MIC:'Micah',NAM:'Nahum',HAB:'Habakkuk',ZEP:'Zephaniah',HAG:'Haggai',ZEC:'Zechariah',MAL:'Malachi',MAT:'Matthew',MRK:'Mark',LUK:'Luke',JHN:'John',ACT:'Acts',ROM:'Romans','1CO':'1 Corinthians','2CO':'2 Corinthians',GAL:'Galatians',EPH:'Ephesians',PHP:'Philippians',COL:'Colossians','1TH':'1 Thessalonians','2TH':'2 Thessalonians','1TI':'1 Timothy','2TI':'2 Timothy',TIT:'Titus',PHM:'Philemon',HEB:'Hebrews',JAS:'James','1PE':'1 Peter','2PE':'2 Peter','1JN':'1 John','1JHN':'1 John','2JN':'2 John','3JN':'3 John',Jude:'Jude',REV:'Revelation'};
const CODE_RE='(?:1JHN|1CH|1CO|1JN|1KI|1PE|1SA|1TH|1TI|2CH|2CO|2JN|2KI|2PE|2SA|2TH|2TI|3JN|ACT|AMO|COL|DAN|DEU|ECC|EPH|EST|EXO|EZK|EZR|GAL|GEN|HAB|HAG|HEB|HOS|ISA|JAS|JDG|JER|JHN|JOB|JOL|JON|JOS|LAM|LEV|LUK|MAL|MAT|MIC|MRK|NAM|NEH|NUM|OBA|PHM|PHP|PRO|PSA|REV|ROM|RUT|TIT|ZEC|ZEP|Jude|So)';
function bibleHref(book,ch,v){ return 'bible://'+encodeURIComponent(book+' '+ch+(v?':'+v:'')); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
/* linkify a verbatim Nave's entry: stateful scan; keeps display text identical */
function linkifyNaves(text){
  const tok=new RegExp('\\b'+CODE_RE+'\\b|\\d+(?::\\d+)?(?:[\\-–]\\d+(?::\\d+)?)?(?:,\\d+(?::\\d+)?(?:[\\-–]\\d+(?::\\d+)?)?)*','g');
  let out='', last=0, book=null, m;
  while((m=tok.exec(text))!==null){
    const gap=text.slice(last,m.index);
    out+=esc(gap);
    const t=m[0];
    if(BOOKMAP[t]){ // book code
      book=BOOKMAP[t];
      out+=esc(t);
    } else { // number cluster
      const glueOk = book && /^[\s;,]*(?:with|and|cf\.?|to)?[\s;,]*$/i.test(gap);
      const first = t.match(/^(\d+)(?::(\d+))?/);
      if(glueOk && first){
        out+='<a class="reflink" href="'+bibleHref(book,first[1],first[2]||'')+'">'+esc(t)+'</a>';
      } else { book=null; out+=esc(t); }
    }
    last=m.index+t.length;
  }
  out+=esc(text.slice(last));
  return out;
}
/* full-name refs like "Genesis 1:1-2:3", "Psalm 1", "1 Peter 3:18-20" */
function refLink(ref){
  return '<a class="reflink" href="'+('bible://'+encodeURIComponent(ref))+'">'+esc(ref)+'</a>';
}
function parseFullRef(ref){ // -> {book,ch,v} first verse of ref, book normalized to KJV key
  const m=String(ref).trim().match(/^([1-3]?\s?[A-Za-z][A-Za-z ]+?)\s+(\d+)(?::(\d+))?/);
  if(!m) return null;
  let book=m[1].trim();
  if(book==='Psalm') book='Psalms';
  if(book==='Song of Songs') book='Song of Solomon';
  if(!D.kjv[book]){ const k=Object.keys(D.kjv).find(b=>b.toLowerCase()===book.toLowerCase()); if(k) book=k; else return null; }
  return {book, ch:+m[2], v:m[3]?+m[3]:1};
}
function kjvText(book,ch,v){
  const B=D.kjv[book]; if(!B) return null;
  const C=B[ch-1]; if(!C) return null;
  return C[v-1]||null;
}
/* first reference in a Nave's entry -> {book,ch,v,label} */
function firstNaveRef(entry){
  const re=new RegExp('\\b('+CODE_RE+')\\s+(\\d+)(?::(\\d+))?');
  const m=entry.match(re);
  if(!m) return null;
  const book=BOOKMAP[m[1]]; if(!book) return null;
  const ch=+m[2], v=m[3]?+m[3]:1;
  return {book,ch,v,label:book+' '+ch+':'+v};
}

}

function renderCal(sel){
  const selDate=dateForIndex(sel);
  const y=selDate.getFullYear(), m=selDate.getMonth();
  const first=new Date(y,m,1), start=first.getDay(), dim=new Date(y,m+1,0).getDate();
  const tk=calendarDay();
  let cells='<div class="cal">'+['S','M','T','W','T','F','S'].map(d=>`<div class="hd">${d}</div>`).join('');
  for(let i=0;i<start;i++) cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const idx=dayIndexFor(new Date(y,m,d));
    const has=idx>=0&&idx<D.plan.length;
    const isSel=idx===sel;
    const cls='d'+(has?' has':'')+(has&&S.reads[idx]?' read':'')+(has&&idx===tk?' today':'')+(isSel&&!S.reads[idx]?' sel':'');
    const dot = has&&!S.reads[idx] ? '<span class="cdot"></span>' : '';
    cells+=`<div class="${cls}" ${has?`role="button" tabindex="0" onclick="devoDay=${idx};renderDevo()"`:''}>${d}${dot}</div>`;
  }
  cells+='</div>';
  return `<div class="row">
    <button class="iconb" onclick="calMove(${sel},-1)">‹</button>
    <div class="grow center eyebrow">${selDate.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>
    <button class="iconb" onclick="calMove(${sel},1)">›</button></div>`+cells;
}

function importList(kind){
  const m=modal(`<h3 class="mb">Paste ${kind==='albums'?'album':'sermon'} list</h3>
    <div class="small mb">One per line. "Artist — Title" or plain titles both work; any http link on a line is kept as its link.</div>

  m.querySelector('#imp-go').onclick=()=>{
    const lines=m.querySelector('#imp').value.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));

      const um=l.match(/https?:\/\/\S+/); const u=um?um[0]:'';
      let rest=l.replace(/https?:\/\/\S+/,'').replace(/[|\s]+$/,'').trim();
      rest=rest.replace(/^\d+[\.\)]\s*/,'').replace(/^[-*•]\s*/,'');
      const parts=rest.split(/\s+[—–]\s+| - /);
      if(kind==='albums'&&parts.length>=2) return {a:parts[0].trim(),t:parts.slice(1).join(' — ').trim(),u};
      return kind==='albums'?{t:rest,a:'',u}:{t:rest,u};

    S[kind]=S[kind].concat(items); save(); m.remove();
    kind==='albums'?renderAlbums():renderSermons();

    <div class="gtile" onclick="setStudyView('topic')"><div class="gt-ic">📗</div><div class="gt-t">Webster's</div><div class="gt-s">1828</div></div>
    <div class="gtile" onclick="setStudyView('notes')"><div class="gt-ic">📝</div><div class="gt-t">Notes</div><div class="gt-s">${S.notes.length} saved</div></div>
    <div class="gtile" onclick="setStudyView('character')"><div class="gt-ic">🕮</div><div class="gt-t">Character</div><div class="gt-s">of the week</div></div>
  </div>
  <div class="card">
    <div class="eyebrow mb">Study Tools</div>
    <div class="li tap" onclick="newTopic()"><div class="grow"><div style="font-weight:600">Draw Random Topic</div><div class="tiny">Let God lead your study</div></div><div class="go">›</div></div>
    <div class="li tap" onclick="newCharacter();setStudyView('character')"><div class="grow"><div style="font-weight:600">Draw Random Character</div><div class="tiny">Discover someone new</div></div><div class="go">›</div></div>
    <div class="li tap" onclick="setStudyView('character')"><div class="grow"><div style="font-weight:600">Every Mention in the KJV</div><div class="tiny">Find every verse</div></div><div class="go">›</div></div>
  </div>`;
}
function relatedTopics(entry){
  const m=[...entry.matchAll(/-See ([A-Z][A-Z0-9 ,'\-]+)/g)].map(x=>x[1].trim());
  const seen=new Set(); const out=[];
  for(const s of m){ const k=s.replace(/\s+/g,' ').trim(); if(k&&!seen.has(k)&&k.length<26){ seen.add(k); out.push(k);} }
  return out.slice(0,8);
}
function firstSentence(entry){
  // strip leading refs/codes; take first human sentence up to ~160 chars
  let e=entry.replace(/^[-\s]*/,'');
  const line=e.split('\n').find(l=>{const t=l.replace(/^-/,'').trim(); return t && /[a-z]/.test(t) && t.length>25;});
  if(!line) return '';
  let s=line.replace(/^-/,'').trim();
  const dot=s.indexOf('. '); if(dot>30&&dot<180) s=s.slice(0,dot+1);
  return s.length>200?s.slice(0,197)+'…':s;
}
function renderTopic(){
  const t=naveByIndex(S.currentTopic);
  const mv=memVerseInfo();
  const chips=relatedTopics(t.e);
  const def=firstSentence(t.e);
  el('sv').innerHTML=`
  <div class="card">
    <div class="eyebrow">Current Topic</div>
    <h2 style="font-size:24px;margin-top:3px">${esc(titleCase(t.s))}</h2>
    <div class="small">Nave's Topical Bible</div>
  </div>
  ${def?`<div class="card"><div class="eyebrow mb">Definition</div><div style="font-size:15.5px">${esc(def)}</div></div>`:''}
  <div class="card tap" onclick="renderMemory()" role="button" tabindex="0">
    <div class="eyebrow mb">Memory Verse</div>
    <div class="scripture">${esc(mv.text)}<span class="ref">${esc(mv.ref)}</span></div>
    <div class="tiny mt center">Tap to practice</div>
  </div>
  <div class="card">
    <div class="eyebrow mb">Nave's Topical Bible</div>
    <div class="naves">${linkifyNaves(t.e)}</div>
  </div>
  ${chips.length?`<div class="card"><div class="eyebrow mb">Related Topics</div>
    <div class="chips">${chips.map(c=>`<button class="chip" onclick="jumpTopic('${esc(c).replace(/'/g,"\\'")}')">${esc(titleCase(c))}</button>`).join('')}</div></div>`:''}
  <div class="card" id="strongs-card"><div class="eyebrow mb">Strong's Concordance</div><div class="small">Loading…</div></div>
  <div class="card" id="webster-card"><div class="eyebrow mb">Webster's 1828</div><div class="small">Loading…</div></div>
  <div class="card">
    <div class="btnrow" style="margin:0"><button class="btn" onclick="addNote('t')">Add note on this topic</button><button class="btn ghost" onclick="newTopic()">New topic</button></div>
  </div>
  ${questionsCard()}`;
  fillStrongs(t.s,'strongs-card');
  fillWebster(t.s,'webster-card');
}
function jumpTopic(name){
  const up=name.toUpperCase();
  let idx=D.naves.findIndex(x=>x.s===up&&x.r===1);
  if(idx<0) idx=D.naves.findIndex(x=>x.s===up);
  if(idx<0) idx=D.naves.findIndex(x=>x.s.indexOf(up)===0);
  if(idx>=0){ const x=D.naves[idx];
    if(x.k==='c'){S.currentCharacter=idx;save();setStudyView('character');}
    else {S.currentTopic=idx;S.memProgress={};save();setStudyView('topic');}
  }
}
function titleCase(s){ return s.replace(/\w\S*/g,w=>w[0].toUpperCase()+w.slice(1).toLowerCase()); }
function headword(s){ return s.split(/[ ,(]/)[0].toLowerCase().replace(/[^a-z\-]/g,''); }
async function fillStrongs(subject,id){
  try{
    const st=await getStrongs();
    const w=headword(subject);
    const nums=(st.i[w]||[]).slice(0,8);
    const box=el(id); if(!box) return;
    if(!nums.length){ box.innerHTML=`<div class="eyebrow mb">Strong's Concordance</div><div class="small">No Hebrew or Greek entry matches “${esc(w)}”.</div>`; return; }
    const heb=nums.filter(n=>n[0]==='H').slice(0,4), grk=nums.filter(n=>n[0]==='G').slice(0,4);
    const block=(title,list)=>list.length?`<div class="mt"><div class="tiny" style="letter-spacing:.14em;text-transform:uppercase;color:var(--text2)">${title}</div>
      ${list.map(n=>{const e=st.e[n];return `<div class="mt" style="margin-top:7px"><b style="font-family:Playfair Display,serif;color:var(--blue)">${esc(e.l)}</b> <span class="small">${esc(e.x||'')} · ${n}</span><br><span style="font-size:15px">${esc(e.d)}</span></div>`;}).join('')}</div>`:'';
    box.innerHTML=`<div class="eyebrow mb">Strong's Concordance</div>${block('Hebrew',heb)}${block('Greek',grk)}`;
  }catch(e){ const box=el(id); if(box) box.innerHTML=`<div class="eyebrow mb">Strong's Concordance</div><div class="small">Unavailable offline until first viewed online.</div>`; }
}
async function fillWebster(subject,id){
  try{
    const w=headword(subject);
    const dict=await getWebster(w[0]);
    const defs=dict[w];
    const box=el(id); if(!box) return;
    if(!defs){ box.innerHTML=`<div class="eyebrow mb">Webster's 1828</div><div class="small">No 1828 entry for “${esc(w)}”.</div>`; return; }
    box.innerHTML=`<div class="eyebrow mb">Webster's 1828 — ${esc(w.toUpperCase())}</div>
      ${defs.slice(0,3).map(d=>`<div class="mt" style="font-size:15px"><i class="small">${esc(d[0])}</i> ${esc(d[1])}</div>`).join('')}`;
  }catch(e){ const box=el(id); if(box) box.innerHTML=`<div class="eyebrow mb">Webster's 1828</div><div class="small">Unavailable offline until first viewed online.</div>`; }
}
function newTopic(){
  S.currentTopic=randNave('t');
  const t=naveByIndex(S.currentTopic), r=firstNaveRef(t.e);
  if(r) S.memProgress={};
  save(); setStudyView('topic');
}
function newCharacter(){ S.currentCharacter=randNave('c'); save(); if(studyView==='character') renderStudy(); }
function medallion(name){
  if(PLACES.has(name)) return `<svg viewBox="0 0 24 24"><path d="M12 3 L20 9 V20 H4 V9 Z M9 20 V13 H15 V20 M4 9 H20"/></svg>`;
  if(FEMALE.has(name)) return `<svg viewBox="0 0 24 24"><circle cx="12" cy="8.2" r="3.6"/><path d="M8.5 6.5 C7 9 6.5 11 6 12.5 M15.5 6.5 C17 9 17.5 11 18 12.5 M5.5 20 C6 15.8 8.6 13.6 12 13.6 C15.4 13.6 18 15.8 18.5 20"/></svg>`;
  return `<svg viewBox="0 0 24 24"><circle cx="12" cy="7.8" r="3.4"/><path d="M5.5 20 C6 15.6 8.6 13.4 12 13.4 C15.4 13.4 18 15.6 18.5 20 M9.2 5.4 C10 4.2 14 4.2 14.8 5.4"/></svg>`;
}
function keyVerses(entry,max){
  // pull first N linkable refs from the nave entry
  const re=new RegExp('\\b('+CODE_RE+')\\s+(\\d+)(?::(\\d+))?','g');
  const out=[]; let m;
  while((m=re.exec(entry))!==null && out.length<(max||4)){
    const book=BOOKMAP[m[1]]; if(!book) continue;
    const ch=+m[2], v=m[3]?+m[3]:1;
    const ref=book+' '+ch+(m[3]?':'+v:'');
    if(!out.some(o=>o.ref===ref)){ const txt=kjvText(book,ch,v)||''; out.push({ref,txt}); }
  }
  return out;
}
function renderCharacter(){
  const c=naveByIndex(S.currentCharacter);
  const bio=D.bios[c.s]||'';
  const kv=keyVerses(c.e,4);
  el('sv').innerHTML=`
  <div class="card center" style="padding-top:24px">
    <div class="medal">${medallion(c.s)}</div>
    <div class="eyebrow mt">KJV Biography</div>
    <h2 style="font-size:26px;margin:4px 0 10px">${esc(titleCase(c.s))}</h2>
    <button class="btn sm" onclick="newCharacter();renderStudy()">New character</button>
  </div>
  <div class="card">
    <div class="eyebrow mb">Overview</div>
    <div style="font-size:15.5px;line-height:1.6">${esc(bio)}</div>
  </div>
  ${kv.length?`<div class="card"><div class="eyebrow mb">Key Verses</div>
    ${kv.map(k=>`<div class="li"><div class="grow"><div style="font-weight:600">${refLink(k.ref)}</div>${k.txt?`<div class="small" style="font-style:italic">${esc(k.txt.length>90?k.txt.slice(0,88)+'…':k.txt)}</div>`:''}</div></div>`).join('')}</div>`:''}
  <div class="card">
    <div class="eyebrow mb">Nave's Passages</div>
    <div class="naves">${linkifyNaves(c.e)}</div>
  </div>
  <div class="card">
    <div class="btnrow" style="margin:0">
      <button class="btn" onclick="everyMention()">Every mention in the KJV</button>
      <button class="btn ghost" onclick="addNote('c')">Add note</button>
    </div>
    <div id="mentions"></div>
  </div>`;
}
function everyMention(){
  const c=naveByIndex(S.currentCharacter);
  const name=titleCase(c.s.split(/[ ,(]/)[0]);
  const re=new RegExp('\\b'+name+'\\b','i');
  const hits=[];
  for(const book in D.kjv){
    const chs=D.kjv[book];
    for(let ci=0;ci<chs.length;ci++){
      const vs=chs[ci];
      for(let vi=0;vi<vs.length;vi++){
        if(re.test(vs[vi])){ hits.push(book+' '+(ci+1)+':'+(vi+1)); if(hits.length>=400) break; }
      }
      if(hits.length>=400) break;
    }
    if(hits.length>=400) break;
  }
  el('mentions').innerHTML=`<hr class="rule"><div class="eyebrow mb">“${esc(name)}” — ${hits.length}${hits.length>=400?'+':''} verses</div>
    <div class="small" style="line-height:2">${hits.map(r=>refLink(r)).join(' · ')||'No mentions found.'}</div>`;
}

/* ---------- Questions ---------- */
function allQuestions(){ return D.content.questions.concat(S.userQuestions); }
function questionsCard(){
  const qs=allQuestions();
  return `<details class="card"><summary>Questions from the Scriptures (${qs.length})</summary>
    <div class="btnrow"><button class="btn sm" onclick="addQuestion()">Add question</button></div>
    ${qs.map((q,i)=>`<div class="li">
      <div class="check ${S.qStudied[i]?'on':''}" role="checkbox" aria-checked="${!!S.qStudied[i]}" tabindex="0" onclick="S.qStudied[${i}]=!S.qStudied[${i}];save();renderStudy()">✓</div>
      <div class="grow"><span style="font-size:15.5px">${i+1}. ${esc(q.q)}</span><div class="tiny mt" style="margin-top:4px">${q.r.map(r=>refLink(r)).join(' · ')}</div></div>
    </div>`).join('')}
  </details>`;
}
function addQuestion(){
  const m=modal(`<h3 class="mb">Add a question</h3>
    <textarea id="q-t" rows="3" placeholder="The question"></textarea><div class="mt"></div>
    <input id="q-r" placeholder="References, comma-separated (John 3:16, Romans 5)"><div class="mt"></div>
    <button class="btn solid" id="q-go">Add</button>`);
  m.querySelector('#q-go').onclick=()=>{
    const q=m.querySelector('#q-t').value.trim(); if(!q) return;
    const r=m.querySelector('#q-r').value.split(',').map(x=>x.trim()).filter(Boolean);
    S.userQuestions.push({q,r}); save(); m.remove(); renderStudy();
  };
}
/* ---------- Notes ---------- */
function addNote(kind){
  const subj=kind==='t'?naveByIndex(S.currentTopic).s:naveByIndex(S.currentCharacter).s;
  const m=modal(`<h3 class="mb">Note — ${esc(titleCase(subj))}</h3>
    <textarea id="n-t" rows="6" placeholder="Write your note"></textarea><div class="mt"></div>
    <button class="btn solid" id="n-go">Save note</button>`);
  m.querySelector('#n-go').onclick=()=>{
    const t=m.querySelector('#n-t').value.trim(); if(!t) return;
    S.notes.unshift({id:Date.now(),subject:subj,kind,text:t,date:todayKey()});
    save(); m.remove();
  };
}
let noteFilter='all';
function renderNotes(){
  const notes=S.notes.filter(n=>noteFilter==='all'||(noteFilter==='topic'&&n.kind==='t')||(noteFilter==='char'&&n.kind==='c'));
  el('sv').innerHTML=`
  <div class="tabs" style="margin-top:2px">
    <button class="${noteFilter==='all'?'on':''}" onclick="noteFilter='all';renderNotes()">All Notes</button>
    <button class="${noteFilter==='topic'?'on':''}" onclick="noteFilter='topic';renderNotes()">By Topic</button>
    <button class="${noteFilter==='char'?'on':''}" onclick="noteFilter='char';renderNotes()">By Character</button>
  </div>
  ${notes.length? notes.map(n=>`
    <div class="card">
      <div class="row"><div class="grow"><div style="font-family:Playfair Display,serif;font-weight:600;font-size:16px">${esc(titleCase(n.subject))}</div><div class="tiny">${esc(n.date)}</div></div>
        <div class="star">${'\u2606'}</div>
        <button class="iconb" aria-label="Delete note" onclick="delNote(${n.id})">✕</button></div>
      <div class="mt" style="white-space:pre-wrap;font-size:15px">${esc(n.text)}</div>
    </div>`).join('')
    : `<div class="card center small" style="padding:36px 16px">Notes you attach to topics and characters gather here.</div>`}
  <div class="card">
    <div class="eyebrow mb">Export &amp; Backup</div>
    <div class="li tap" onclick="exportNotes()"><div class="grow"><div style="font-weight:600">Download Notes (Text)</div><div class="tiny">Save a backup to your device</div></div><div class="go">↓</div></div>
    <div class="li tap" onclick="setGdoc()"><div class="grow"><div style="font-weight:600">${S.gdoc?'Open Google Doc':'Link to Google Doc'}</div><div class="tiny">Open your notes in Google Docs</div></div><div class="go">↗</div></div>
  </div>`;
}
function delNote(id){ if(!confirm('Delete this note?')) return; S.notes=S.notes.filter(n=>n.id!==id); save(); renderNotes(); }
function exportNotes(){
  const txt=S.notes.map(n=>`[${n.date}] ${n.subject}\n${n.text}`).join('\n\n---\n\n')||'No notes yet.';
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='mywalk-notes-'+todayKey()+'.txt';
  a.click(); URL.revokeObjectURL(a.href);
}
function setGdoc(){
  if(S.gdoc){ window.open(S.gdoc,'_blank'); return; }
  const u=prompt('Paste your Google Doc link:');
  if(u){ S.gdoc=u.trim(); save(); renderNotes(); }
}
/* ---------- Memory practice ---------- */
function renderMemory(){
  const mv=memVerseInfo();
  if(!mv.text){ el('sv').innerHTML='<div class="card small">The current topic has no parsable first reference — draw a new topic.</div>'; return; }
  const words=mv.text.split(/\s+/);
  const hidden=S.memProgress[mv.ref]||[];
  el('sv').innerHTML=`
  <div class="card">
    <div class="row"><div class="grow eyebrow">Memory Practice — ${esc(titleCase(mv.topic))}</div>
      <button class="btn sm ghost" onclick="setStudyView('topic')">Back</button></div>
    <div class="mt" id="memwords">
      ${words.map((w,i)=>`<span class="mem-w ${hidden.includes(i)?'hid':''}" onclick="memToggle('${esc(mv.ref)}',${i})">${esc(w)}</span>`).join('')}
    </div>
    <div class="mvref mt">${esc(mv.ref)}</div>
    <div class="btnrow mt">
      <button class="btn ghost sm" onclick="memHideMore('${esc(mv.ref)}',${words.length})">Hide a few more</button>
      <button class="btn ghost sm" onclick="S.memProgress['${esc(mv.ref)}']=[];save();renderMemory()">Reveal all</button>
      <button class="btn solid sm" onclick="memComplete()">Recited — archive it ✓</button>
    </div>
    <div class="tiny">Tap words to hide them; recite from the blanks until you can say it all.</div>
  </div>
  ${S.memArchive.length?`<details class="card"><summary>Memorized verses (${S.memArchive.length})</summary>
    ${S.memArchive.map(m=>`<div class="li"><div class="grow"><b style="font-family:Playfair Display,serif;font-size:14px;color:var(--blue)">${esc(m.ref)}</b><div class="small" style="font-style:italic">${esc(m.text)}</div><div class="tiny">${esc(m.topic)} · ${esc(m.date)}</div></div></div>`).join('')}
  </details>`:''}`;
}
function memToggle(ref,i){
  const a=S.memProgress[ref]=S.memProgress[ref]||[];
  const p=a.indexOf(i); if(p>=0) a.splice(p,1); else a.push(i);
  save(); renderMemory();
}
function memHideMore(ref,total){
  const a=S.memProgress[ref]=S.memProgress[ref]||[];
  const pool=[]; for(let i=0;i<total;i++) if(!a.includes(i)) pool.push(i);
  for(let k=0;k<Math.min(3,pool.length);k++){
    const j=Math.floor(Math.random()*pool.length);
    a.push(pool.splice(j,1)[0]);
  }
  save(); renderMemory();
}
function memComplete(){
  const mv=memVerseInfo();
  if(!S.memArchive.some(m=>m.ref===mv.ref))
    S.memArchive.unshift({ref:mv.ref,text:mv.text,topic:titleCase(mv.topic),date:todayKey()});
  save(); renderMemory();
}
/* ---------- Search & Browse ---------- */
let browseKind='all', browseQ='';
function studyBrowseKind(k){ browseKind=k; setStudyView('browse'); }
function studyBrowse(){
  const popular=['FAITH','GRACE','REPENTANCE','SALVATION','PRAYER','LOVE','FORGIVENESS','HOLINESS'];
  const recent=(S.recentStudy||[]).slice(0,3);
  el('sv').innerHTML=`
  <div class="searchbar"><input id="br-q" placeholder="Search 5,319 entries…" value="${esc(browseQ)}" autocomplete="off"></div>
  <div class="tabs" style="margin-top:8px">
    <button class="${browseKind==='all'?'on':''}" onclick="browseKind='all';studyBrowse()">All</button>
    <button class="${browseKind==='t'?'on':''}" onclick="browseKind='t';studyBrowse()">Topics</button>
    <button class="${browseKind==='c'?'on':''}" onclick="browseKind='c';studyBrowse()">Characters</button>
    <button class="${browseKind==='p'?'on':''}" onclick="browseKind='p';studyBrowse()">Places</button>
  </div>
  <div id="br-r"></div>`;
  const inp=el('br-q'), rbox=el('br-r');
  function run(){
    const q=(inp.value||'').trim().toUpperCase(); browseQ=inp.value;
    if(q.length<1){
      rbox.innerHTML=`
      <div class="card">
        <div class="eyebrow mb">Browse All Entries</div>
        <div class="li tap" onclick="browseKind='t';studyBrowse()"><div class="grow"><div style="font-weight:600">Topics</div><div class="tiny">3,419 entries</div></div><div class="go">›</div></div>
        <div class="li tap" onclick="browseKind='c';studyBrowse()"><div class="grow"><div style="font-weight:600">Characters</div><div class="tiny">1,370 entries</div></div><div class="go">›</div></div>
        <div class="li tap" onclick="browseKind='p';studyBrowse()"><div class="grow"><div style="font-weight:600">Places</div><div class="tiny">530 entries</div></div><div class="go">›</div></div>
      </div>
      ${recent.length?`<div class="card"><div class="eyebrow mb">Recently Viewed</div>${recent.map(i=>{const x=D.naves[i];if(!x)return'';return `<div class="li tap" onclick="pickNave(${i})"><div class="grow">${esc(titleCase(x.s))}</div><div class="tiny">${x.k==='c'?'Character':x.k==='p'?'Place':'Topic'}</div></div>`;}).join('')}</div>`:''}
      <div class="card"><div class="eyebrow mb">Popular Topics</div>${popular.map(p=>`<div class="li tap" onclick="jumpTopic('${p}')"><div class="grow">${esc(titleCase(p))}</div><div class="go">›</div></div>`).join('')}</div>`;
      return;
    }
    const hits=[];
    for(let i=0;i<D.naves.length&&hits.length<80;i++){
      const x=D.naves[i];
      if(browseKind!=='all'&&x.k!==browseKind) continue;
      if(x.s.indexOf(q)>=0) hits.push(i);
    }
    rbox.innerHTML=`<div class="card" style="padding:6px 12px">${hits.map(i=>{
      const x=D.naves[i];
      return `<div class="li tap" onclick="pickNave(${i})"><div class="pill">${x.k==='c'?'Char':x.k==='p'?'Place':'Topic'}</div><div class="grow">${esc(titleCase(x.s))}</div><div class="go">›</div></div>`;
    }).join('')||'<p class="small" style="padding:10px 0">No matches.</p>'}</div>`;
  }
  inp.addEventListener('input',run);
  run();
  if(browseQ) inp.focus();
}
function pickNave(i){
  const x=D.naves[i];
  S.recentStudy=[i].concat((S.recentStudy||[]).filter(j=>j!==i)).slice(0,8);
  if(x.k==='c'){ S.currentCharacter=i; save(); setStudyView('character'); }
  else { S.currentTopic=i; S.memProgress={}; save(); setStudyView('topic'); }
}

/* ---------- service worker + boot ---------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http'))
  navigator.serviceWorker.register('sw.js?v=14').catch(()=>{});
boot().catch(e=>{ APP.innerHTML='<div class="loading">Could not load data files.<br>'+esc(e.message)+'</div>'; });
