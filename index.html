<style>
:root{
  --bg:#F6F2EA; --bg2:#F7F5F2; --card:#FCFAF7; --tint:#EEF4FA;
  --blue:#2D4C73; --blue2:#476C9B;
  --gold:#D4AF37; --goldsoft:#E5CE8A; --gold2:#E4C97A;
  --text:#202124; --text2:#666A73; --div:#E8E3D9; --div2:#F0EBDF;
  --accent:var(--blue); --accent2:var(--blue2);
}
body.wing-devo{--accent:#2D4C73;--accent2:#476C9B}
body.wing-prayer{--accent:#3A5A85;--accent2:#5A7BA6}
body.wing-study{--accent:#35608F;--accent2:#5480AC}
/* ---- dark mode (manual toggle in Settings) ---- */
html.dark{
  --bg:#0F1A28; --bg2:#12202F; --card:#182838; --tint:#1B2E44;
  --blue:#6E97C6; --blue2:#8FB2DB;
  --gold:#D9B84A; --goldsoft:#E7D89A; --gold2:#E8CF86;
  --text:#ECEEF2; --text2:#9AA6B6; --div:#28394F; --div2:#223248;
  --accent:#6E97C6; --accent2:#8FB2DB;
}
html.dark body.wing-devo{--accent:#6E97C6;--accent2:#8FB2DB}
html.dark body.wing-prayer{--accent:#7AA0CC;--accent2:#96B7DE}
html.dark body.wing-study{--accent:#72A0CF;--accent2:#93B7DE}
html.dark .card.tap:active{background:#1D3047}
html.dark .card{box-shadow:0 1px 1px rgba(0,0,0,.25),0 6px 18px rgba(0,0,0,.35)}
html.dark .rule::after{background:var(--card)}
html.dark input,html.dark textarea,html.dark select{background:#12202F;border-color:var(--div);color:var(--text)}
html.dark nav{background:rgba(15,26,40,.96);border-top-color:var(--div)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);background-attachment:fixed;color:var(--text);font-family:"Nunito Sans",-apple-system,sans-serif;font-size:16px;line-height:1.6;min-height:100vh;padding-bottom:calc(78px + env(safe-area-inset-bottom))}
#app{max-width:640px;margin:0 auto;padding:16px 18px 28px;position:relative}
a{color:var(--blue2);text-decoration:none}
button{font-family:"Nunito Sans",sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:"Nunito Sans",sans-serif;font-size:16px;color:var(--text);background:var(--card);border:1px solid var(--div);border-radius:10px;padding:11px 13px;width:100%}
input::placeholder,textarea::placeholder{color:var(--text2)}
input:focus,textarea:focus,select:focus,button:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--blue2);outline-offset:2px}
h1,h2,h3{font-family:"Playfair Display",serif;font-weight:600;color:var(--text);letter-spacing:.005em}
.eyebrow{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
/* ---- cards: white paper, spacing over shadow ---- */
.card{background:var(--card);border:1px solid var(--div);border-radius:16px;padding:18px;margin:15px 0;position:relative;box-shadow:0 1px 1px rgba(32,33,36,.03),0 6px 18px rgba(32,33,36,.07)}
.card.tap{cursor:pointer}
.card.tap:active{background:#FCFAF4}
.rule{height:11px;border:none;margin:12px 0;position:relative;background:none}
.rule::before{content:"";position:absolute;top:5px;left:0;right:0;height:1px;background:var(--div)}
.rule::after{content:"✦";position:absolute;top:0;left:50%;transform:translateX(-50%);color:var(--gold);font-size:9px;line-height:11px;background:var(--card);padding:0 8px}
/* ---- hero: quiet photo date card ---- */
.hero{border:none;border-radius:16px;overflow:hidden;position:relative;margin:16px 0;box-shadow:0 2px 8px rgba(32,33,36,.08)}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#B9C9DC 0%,#8FA6C2 70%);background-size:cover;background-position:center}
.hero-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,32,50,.08) 0%,rgba(20,32,50,.62) 85%)}
.hero-in{position:relative;padding:24px 20px 18px;min-height:230px;display:flex;flex-direction:column;justify-content:flex-end}
.hero-frame{display:none}
.hero .c3,.hero .c4{display:none}
.hero-date{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--goldsoft);margin-bottom:9px}
.hero-verse{font-family:"Playfair Display",serif;font-size:20px;line-height:1.5;font-style:italic;color:#fff;text-shadow:0 1px 10px rgba(10,20,35,.5)}
.hero-verse::first-letter{font-size:inherit;float:none;margin:0}
.hero-ref{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:12px;color:#E8EEF6;margin-top:8px;letter-spacing:.1em;text-transform:uppercase}
.hero-story{margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,.28);font-family:"Nunito Sans",sans-serif;font-weight:500;font-size:13.5px;color:#F0F4F9;letter-spacing:.02em}
.greet{font-family:"Playfair Display",serif;font-size:27px;font-weight:600;color:var(--text);margin:10px 2px 0}
/* ---- home rows ---- */
.hcard{display:flex;align-items:center;gap:14px}
.hcard .ic{width:40px;height:40px;flex:0 0 40px;border:none;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:17px;background:var(--tint)}
.hcard .bd{flex:1;min-width:0}
.hcard .t1{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--text2);margin-bottom:2px}
.hcard .t2{font-family:"Nunito Sans",sans-serif;font-weight:500;font-size:16.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard .t3{font-size:13.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard .go{color:#C4BCA9;font-size:19px}
/* ---- nav ---- */
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);border-top:1px solid var(--div)}
nav button{flex:1;padding:11px 0 9px;font-size:10.5px;font-weight:500;letter-spacing:.06em;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
nav button .nic{width:24px;height:24px}
nav button.on{color:var(--accent)}
nav button.on::after{content:"";position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
/* ---- sections ---- */
.pagehead{display:flex;align-items:baseline;justify-content:space-between;margin:12px 2px 4px}
.pagehead h1{font-size:28px;font-weight:700}
.pageback{width:38px;height:38px;flex:0 0 38px;display:flex;align-items:center;justify-content:center;border:1px solid var(--div);border-radius:11px;background:var(--card);color:var(--text2)}
.pageback .ic-svg{width:20px;height:20px;transform:rotate(180deg)}
.pageback-bottom{margin:8px auto 12px}
.tabs{display:flex;gap:8px;margin:14px 0 6px}
.tabs button{flex:1;font-size:13px;font-weight:600;padding:10px 0;border:1px solid var(--div);border-radius:10px;color:var(--text2);background:var(--card)}
.tabs button.on{border-color:var(--accent);color:#fff;background:var(--accent)}
.btn{display:inline-block;font-size:13.5px;font-weight:600;border:1.5px solid var(--accent);color:var(--accent);border-radius:10px;padding:11px 18px;letter-spacing:.02em}
.btn:active{background:var(--tint)}
.btn.solid{background:var(--accent);color:#fff}
.btn.ghost{border-color:var(--div);color:var(--text2)}
.btn.sm{padding:7px 12px;font-size:12px}
.btnrow{display:flex;gap:9px;flex-wrap:wrap;margin:12px 0}
/* scripture: quiet tinted reading panel, gold marker */
.scripture{background:var(--tint);color:var(--text);border:none;border-radius:12px;padding:17px 18px;font-family:"Cormorant Garamond",serif;font-weight:500;font-style:italic;font-size:20px;line-height:1.5;box-shadow:none;position:relative}
.scripture::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:2px;background:var(--gold);border-radius:2px}
.scripture .ref{font-family:"Nunito Sans",sans-serif;font-style:normal;font-weight:600;font-size:11.5px;color:var(--blue);display:block;margin-top:10px;letter-spacing:.12em;text-transform:uppercase}
.naves{white-space:pre-wrap;font-size:14.5px;line-height:1.65;color:var(--text);font-family:"Nunito Sans",sans-serif}
.naves a{border-bottom:1px solid #CBD9EA;color:var(--blue2)}
.reflink{border-bottom:1px solid #CBD9EA;color:var(--blue2)}
.check{width:26px;height:26px;flex:0 0 26px;border:1.5px solid var(--blue2);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:transparent;font-size:15px}
.check.on{background:var(--accent);border-color:var(--accent);color:#fff}
.row{display:flex;align-items:center;gap:11px}
.grow{flex:1;min-width:0}
.small{font-size:13.5px;color:var(--text2)}
.tiny{font-size:12px;color:var(--text2)}
.right{text-align:right}
.center{text-align:center}
.mt{margin-top:12px}.mb{margin-bottom:12px}
/* calendar — gold reserved for today */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.cal .d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13.5px;color:#B9B2A0;border:1px solid transparent}
.cal .d.has{color:var(--text);border-color:var(--div)}
.cal .d.read{background:var(--accent);color:#fff;font-weight:600;border-color:var(--accent)}
.cal .d.today{outline:2px solid var(--gold);outline-offset:-1px}
.cal .hd{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:10px;letter-spacing:.08em;color:var(--text2);text-align:center}
/* hymn */
.hymn-v{margin:16px 0;font-family:"Playfair Display",serif;font-style:italic;font-size:18px;line-height:1.66;white-space:pre-line;color:var(--text)}
.hymn-c{margin:16px 0;padding:13px 16px;border-left:2px solid var(--gold);font-family:"Playfair Display",serif;font-style:italic;white-space:pre-line;color:var(--blue);background:var(--tint);border-radius:0 10px 10px 0}
.vnum{font-family:"Nunito Sans",sans-serif;font-style:normal;font-weight:600;font-size:11px;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.13em;text-transform:uppercase}
/* flash card */

/* memory practice */
.mem-w{display:inline-block;margin:0 4px 8px 0;padding:3px 9px;border-radius:8px;background:var(--tint);color:var(--text);font-family:"Playfair Display",serif;font-size:17.5px;cursor:pointer;user-select:none}
.mem-w.hid{background:var(--card);color:transparent;border:1px dashed var(--div);box-shadow:none}
/* character medallion */
.medal{width:88px;height:88px;border-radius:50%;border:1.5px solid var(--blue2);margin:0 auto;display:flex;align-items:center;justify-content:center;background:var(--tint);box-shadow:none}
.medal svg{width:50px;height:50px;stroke:var(--blue);fill:none;stroke-width:1.4}
/* lists */
.li{display:flex;align-items:center;gap:11px;padding:13px 2px;border-bottom:1px solid var(--div2)}
.li:last-child{border-bottom:none}
.pill{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:99px;padding:3px 10px;color:var(--blue);background:var(--tint)}
.iconb{font-size:16px;color:#B9B2A0;padding:6px 8px}
.modal{position:fixed;inset:0;background:rgba(32,33,36,.35);z-index:90;display:flex;align-items:flex-end;justify-content:center}
.modal .mbox{background:var(--card);border:none;border-radius:18px 18px 0 0;max-width:640px;width:100%;max-height:86vh;overflow:auto;padding:24px 18px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -6px 30px rgba(32,33,36,.18)}
.searchwrap{position:sticky;top:-24px;background:var(--card);padding:4px 0 10px;z-index:2}
details summary{cursor:pointer;font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);padding:8px 0;list-style:none}

.homebtn{position:fixed;top:12px;right:max(16px,calc(50vw - 320px + 16px));z-index:60;width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--div);display:flex;align-items:center;justify-content:center;color:var(--accent);box-shadow:0 1px 3px rgba(32,33,36,.08)}
.homebtn .ic-svg{width:19px;height:19px}
.homebtn:active{background:var(--tint)}
body.wing-home .homebtn{display:none}
.sheet-h{font-family:"Playfair Display",serif;font-weight:700;font-size:24px;color:var(--text);margin-bottom:2px}
.sset{background:var(--tint);border-radius:12px;padding:2px 0;margin-top:14px}
.sset .li{padding:13px 15px;border-color:rgba(45,76,115,.10)}
.sset .k{font-size:13px;color:var(--text2)}
.sset .v{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:15px;color:var(--text)}
.sfoot{font-size:11.5px;color:var(--text2);text-align:center;margin-top:16px;letter-spacing:.04em}

.bookmark{position:absolute;top:0;right:18px;width:22px;height:30px;background:var(--gold);clip-path:polygon(0 0,100% 0,100% 100%,50% 82%,0 100%)}
.mvtext{font-family:"Cormorant Garamond",serif;font-weight:500;font-style:italic;font-size:21px;line-height:1.45;color:var(--text)}
.mvref{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:11.5px;color:var(--blue);margin-top:8px;letter-spacing:.1em;text-transform:uppercase}
.linkbtn{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:13.5px;color:var(--accent);letter-spacing:.02em}
.rtitle{font-family:"Playfair Display",serif;font-weight:600;font-size:19px;color:var(--text);margin:2px 0 2px}
.rblurb{font-size:14.5px;color:var(--text2);line-height:1.55}
.markbtn{flex:0 0 auto;font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:12.5px;border:1.5px solid var(--div);color:var(--text2);border-radius:10px;padding:11px 13px}
.markbtn.on{border-color:var(--accent);color:var(--accent);background:var(--tint)}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:14px 0}
.tile{background:var(--card);border:1px solid var(--div);border-radius:14px;padding:15px 8px 13px;text-align:center;box-shadow:0 1px 2px rgba(32,33,36,.04)}
.tile .tlabel{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.tile .tnum{font-family:"Playfair Display",serif;font-weight:700;font-size:30px;color:var(--text);line-height:1.15;margin-top:4px}
.tile .tnum.gold{color:var(--gold)}
.tile .tsub{font-size:12px;color:var(--text2)}
.mring{width:52px;height:52px;margin:2px auto 0;display:block}
.journey .jtext{font-size:15px;color:var(--text);margin-top:3px}
.journey .jflag{font-size:20px;opacity:.8}


.subtabs{display:flex;gap:8px;margin:14px 0 6px;overflow-x:auto}
.subtabs button{flex:1;white-space:nowrap;font-size:12.5px;font-weight:600;padding:10px 12px;border:1px solid var(--div);border-radius:10px;color:var(--text2);background:var(--card)}
.subtabs button.on{border-color:var(--accent);color:#fff;background:var(--accent)}

.pring{width:56px;height:56px;display:block}
.plabel{font-size:11px;color:var(--text2)}
.playb{flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:var(--tint);color:var(--accent);font-size:12px;display:flex;align-items:center;justify-content:center}
.check.sm{width:22px;height:22px;flex:0 0 22px;font-size:13px}
.cal .d{position:relative}
.cdot{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue2)}
.cal .d.sel{border-color:var(--blue2);background:var(--tint)}
.cal .d.read .cdot{display:none}



.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin:14px 0}
.gtile{background:var(--card);border:1px solid var(--div);border-radius:14px;padding:16px 14px;cursor:pointer;box-shadow:0 1px 2px rgba(32,33,36,.04)}
.gtile:active{background:#FCFAF4}
.gt-ic{font-size:22px}
.gt-t{font-family:"Playfair Display",serif;font-weight:600;font-size:16px;margin-top:6px}
.gt-s{font-size:12.5px;color:var(--text2)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:12.5px;padding:7px 13px;border-radius:99px;background:var(--tint);color:var(--blue);border:none}
.chip:active{background:#E2ECF6}
.searchbar input{background:var(--card);border:1px solid var(--div);font-size:15px;padding:12px 14px}

nav button .nic{width:24px;height:24px}
.ic-svg{width:24px;height:24px;display:block}
nav button.on .nic{stroke-width:2.1}

/* home header */
.homehead{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 2px;margin-bottom:8px}
.hicon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.hicon .ic-svg{width:22px;height:22px}
.greet-c{text-align:center;line-height:1.15}
.greet-sm{font-family:"Playfair Display",serif;font-size:19px;color:var(--text2)}
.greet-lg{font-family:"Playfair Display",serif;font-weight:700;font-size:24px;color:var(--text)}
/* hero */
.hero2{border-radius:18px;overflow:hidden;position:relative;height:184px;box-shadow:0 8px 24px rgba(32,33,36,.12)}
.hero2-bg{position:absolute;inset:0;background:linear-gradient(160deg,#C4D2E2,#9DB3CC);background-size:cover;background-position:center}
.hero2-date{position:absolute;left:18px;bottom:16px;font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:11px;letter-spacing:.16em;color:#fff;text-shadow:0 1px 6px rgba(10,20,35,.5)}
/* memory verse overlap card */
.mvcard{position:relative;z-index:2;text-align:left;box-shadow:0 4px 16px rgba(32,33,36,.08)}
.ribbon{position:absolute;top:-2px;right:18px;color:var(--gold)}
.ribbon .ic-svg{width:22px;height:30px;fill:var(--gold);stroke:var(--gold)}
.mvcard .mvref{text-align:center;margin-top:8px}
.tbtn{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:13px;color:var(--blue);display:inline-flex;align-items:center;gap:3px}
.tbtn .chev{width:15px;height:15px}

.daysum-date{font-family:"Playfair Display",serif;font-weight:600;font-size:19px;color:var(--text)}
.daysum-day{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;color:var(--gold);margin-top:2px}
.dsum-status{flex:0 0 auto;font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:99px;align-self:center}
.dsum-status.done{background:var(--accent);color:#fff}
.dsum-status.todo{background:var(--tint);color:var(--blue)}
.dsum-row{display:flex;align-items:center;gap:13px;padding:12px 0}
.dsum-row:not(:last-of-type){border-bottom:1px solid var(--div2)}
.dsum-ic{width:38px;height:38px;flex:0 0 38px;border-radius:11px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center}
.dsum-ic .ic-svg{width:19px;height:19px}
.dsum-row .grow{min-width:0}
.dsum-lbl{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.dsum-val{font-family:"Playfair Display",serif;font-size:16px;color:var(--text);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dsum-check{width:24px;height:24px;flex:0 0 24px;border-radius:50%;border:1.5px solid var(--div);display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px}
.dsum-check.on{background:var(--accent);border-color:var(--accent);color:#fff}
.gotoday{margin-top:16px}
.gotoday .btn{width:100%;text-align:center;padding:13px}
/* hymnal Song of the Week */
.songhero{position:relative;overflow:hidden;text-align:center;padding:26px 22px 22px}
.songhero .sh-wm{position:absolute;bottom:-22px;right:-14px;width:130px;height:130px;color:var(--gold);opacity:.08;transform:rotate(-10deg);pointer-events:none}
.songhero .sh-wm svg{width:100%;height:100%}
.sh-week{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);position:relative;z-index:1}
.sh-orn{display:flex;align-items:center;justify-content:center;gap:9px;margin:10px 0}
.sh-orn .ol{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.sh-orn .ol:last-child{background:linear-gradient(90deg,var(--gold),transparent)}
.sh-orn .od{color:var(--gold);font-size:8px}
.sh-title{font-family:"Playfair Display",serif;font-weight:600;font-size:25px;line-height:1.2;color:var(--text);position:relative;z-index:1}
.sh-author{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:17px;color:var(--text2);margin-top:5px;position:relative;z-index:1}
.sh-am{position:relative;z-index:1;margin-top:14px}
.am-btn{display:inline-flex;align-items:center;gap:8px;font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:13.5px;color:var(--blue);background:var(--tint);border:1px solid var(--div);border-radius:10px;padding:10px 16px;text-decoration:none}
.am-btn .ic-svg{width:16px;height:16px;color:var(--accent)}
.am-btn:active{background:#EDE7DC}
/* in-app scripture reader */
.rdr-head{text-align:center;padding:2px 0 14px;border-bottom:1px solid var(--div2);margin-bottom:14px}
.rdr-ref{font-family:"Playfair Display",serif;font-weight:600;font-size:23px;color:var(--blue)}
.rdr-sub{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);margin-top:4px}
.rdr-body{max-height:64vh;overflow:auto}
.rdr-v{font-family:"Cormorant Garamond",serif;font-size:19px;line-height:1.62;color:var(--text);margin:0 0 4px;text-indent:0}
.rdr-v .rdr-n{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:11px;color:var(--gold);vertical-align:super;margin-right:5px}
.rdr-v i{font-style:italic;color:var(--text2)}
/* numbered gold verse rail */
.lyrics{padding:8px 4px 4px}
.vrail{display:flex;gap:16px;padding:14px 0}
.vrail:not(:last-child){border-bottom:1px solid var(--div2)}
.vrail .vr-num{flex:0 0 30px;display:flex;flex-direction:column;align-items:center}
.vr-num .vn{font-family:"Playfair Display",serif;font-weight:700;font-size:17px;color:var(--gold);line-height:1}
.vr-num .vl{flex:1;width:1px;background:linear-gradient(180deg,var(--goldsoft),transparent);margin-top:8px;min-height:20px}
.vrail .vr-text{flex:1;font-family:"Playfair Display",serif;font-style:italic;font-size:13.5px;line-height:1.6;white-space:pre-line;color:var(--text)}
.vrail.chorus .vr-num .vn{font-size:11px;font-style:normal;font-family:"Nunito Sans",sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);color:var(--gold)}
.vrail.chorus .vr-text{color:var(--blue);background:var(--tint);border-radius:10px;padding:12px 15px}
/* ===== Batch E — Prayer ===== */
/* summary strip card */
.pray-sum{display:flex;align-items:center;gap:14px}
.pray-sum .grow{min-width:0}
.pray-sum .ps-eyebrow{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--text2)}
.pray-sum .ps-count{font-family:"Playfair Display",serif;font-size:16px;color:var(--text);margin-top:3px}
.pray-sum .ps-count b{font-size:21px;color:var(--blue)}
.ps-flame{flex:0 0 auto;text-align:center}
.ps-flame .pf-num{display:inline-flex;align-items:center;gap:4px;font-family:"Playfair Display",serif;font-weight:700;font-size:22px;color:var(--gold)}
.ps-flame .pf-num .ic-svg{width:17px;height:17px}
.ps-flame .plabel{font-size:10.5px;color:var(--text2);margin-top:1px}
/* navy flash card centerpiece */
.flash{position:relative;overflow:hidden;border:none;border-radius:18px;background:linear-gradient(158deg,#2D4C73,#1d3251);color:#fff;padding:26px 22px 22px;min-height:308px;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(20,32,50,.30)}
.flash .fl-wm{position:absolute;top:-16px;right:-12px;width:120px;height:120px;color:#E4C97A;opacity:.10;pointer-events:none}
.flash .fl-wm svg{width:100%;height:100%}
.flash .fbook{position:absolute;top:18px;right:20px;color:#E4C97A;opacity:.9}
.flash .fbook .ic-svg{width:20px;height:20px}
.flash .fh{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:11.5px;color:#E4C97A;letter-spacing:.16em;text-transform:uppercase;position:relative;z-index:1}
.flash .fn{font-family:"Playfair Display",serif;font-size:27px;font-weight:600;color:#fff;margin:9px 0 4px;position:relative;z-index:1;line-height:1.15}
.flash ul{list-style:none;margin-top:12px;position:relative;z-index:1}
.flash li{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.12);font-size:15px;color:rgba(255,255,255,.9)}
.flash li:last-child{border-bottom:none}
.flash li.p-req{cursor:pointer;padding-left:0;transition:opacity .25s,color .25s}
.flash li.p-req .p-txt{position:relative;display:inline-block}
.flash li.p-req.struck{opacity:.42}
.flash li.p-req.struck .p-txt::after{content:'';position:absolute;left:0;right:0;top:52%;height:1px;background:rgba(255,255,255,.85)}
.flash li.p-req.now{color:#E4C97A}
.flash li.p-req.now .p-txt::before{content:'';position:absolute;left:-11px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:#E4C97A}
.pt-each{display:flex;align-items:center;gap:8px;margin-top:9px}
.pt-seg{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);white-space:nowrap}
.f-prayed{margin-top:12px;text-align:center;font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#E4C97A;opacity:.85;position:relative;z-index:1}
.fverse{margin-top:16px;padding:14px 0 0;border-top:1px solid rgba(228,201,122,.28);font-family:"Cormorant Garamond",serif;font-style:italic;font-size:16px;color:rgba(255,255,255,.82);position:relative;z-index:1}
.fvref{display:block;font-family:"Nunito Sans",sans-serif;font-style:normal;font-weight:700;font-size:10.5px;color:#E4C97A;margin-top:7px;letter-spacing:.12em;text-transform:uppercase}
.prog{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;color:var(--text2);text-transform:uppercase}
/* three circular actions */
.prayrow{display:flex;align-items:flex-start;justify-content:space-around;gap:10px;margin-top:8px}
.circ{display:flex;flex-direction:column;align-items:center;gap:8px;background:none;border:none;cursor:pointer}
.cg{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px}
.cg .ic-svg{width:21px;height:21px}
.cg.ghost{border:1.5px solid var(--div);color:var(--text2);background:var(--card)}
.cg.gold{border:1.5px solid var(--gold);color:var(--gold);background:var(--card)}
.cg.solid{background:linear-gradient(155deg,#2D4C73,#22385c);color:#fff;width:64px;height:64px;font-size:26px;box-shadow:0 6px 16px rgba(45,76,115,.32)}
.cl{font-size:11px;font-weight:600;color:var(--text2)}
.amen{font-family:"Playfair Display",serif;font-weight:600;font-size:28px;color:var(--blue)}
.prayline{font-size:16px;color:var(--text);margin-top:3px}
.prayline b{font-family:"Playfair Display",serif;font-size:22px;color:var(--blue)}
/* overview stat strip */
.pstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-items:end;text-align:center}
.pcol{display:flex;flex-direction:column;align-items:center;gap:5px}
.pflame{font-family:"Playfair Display",serif;font-weight:700;font-size:27px;color:var(--gold)}
.pflame .ic-svg{width:20px;height:20px}
.pdays{font-family:"Playfair Display",serif;font-weight:700;font-size:27px;color:var(--blue)}
.pdays span{font-family:"Nunito Sans",sans-serif;font-weight:400;font-size:13px;color:var(--text2)}
.plabel{font-size:11px;color:var(--text2)}
.jbar{height:8px;border-radius:99px;background:var(--tint);overflow:hidden}
.jbar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#c9a84a);border-radius:99px}
/* list heading cards */
.phead-title{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.phead-title .pleaf{color:var(--gold);flex:0 0 auto}
.phead-title .pleaf .ic-svg{width:17px;height:17px}
.phead-title .pt{font-family:"Playfair Display",serif;font-weight:600;color:var(--text);font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* answered testimony cards w/ gold bookmark ribbon */
.testcard{position:relative;padding-right:44px}
.tribbon{position:absolute;top:-2px;right:18px;width:22px;height:34px;background:linear-gradient(180deg,var(--gold),#c9a84a);border-radius:0 0 3px 3px;display:flex;align-items:flex-start;justify-content:center;padding-top:5px;box-shadow:0 2px 5px rgba(180,150,60,.3)}
.tribbon::after{content:"";position:absolute;bottom:0;left:0;border-left:11px solid var(--gold);border-right:11px solid var(--gold);border-bottom:7px solid var(--bg);width:0;height:0}
.tribbon .ic-svg{width:11px;height:11px;color:#fff;position:relative;z-index:1}
.testcard .tt{font-family:"Playfair Display",serif;font-weight:600;font-size:17px;color:var(--text)}
.star{color:var(--gold);font-size:18px}
/* prayer timer on navy flash card */
.ptimer{position:relative;z-index:1;margin:14px 0 4px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
.pt-set{display:flex;align-items:center;gap:8px}
.pt-lbl{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#E4C97A;margin-right:2px}
.pt-pill{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:12.5px;color:#fff;background:rgba(255,255,255,.10);border:1px solid rgba(228,201,122,.35);border-radius:99px;padding:6px 13px;cursor:pointer}
.pt-pill:active{background:rgba(228,201,122,.22)}
.pt-run{display:flex;align-items:center;gap:12px}
.pt-x{width:34px;height:34px;flex:0 0 34px;border-radius:50%;border:1px solid rgba(228,201,122,.4);background:transparent;color:#E4C97A;display:flex;align-items:center;justify-content:center}
.pt-x .ic-svg{width:15px;height:15px}
.pt-count{font-family:"Playfair Display",serif;font-weight:700;font-size:22px;color:#fff;min-width:56px}
.pt-bar{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden}
.pt-bar span{display:block;height:100%;background:linear-gradient(90deg,#E4C97A,#c9a84a);border-radius:99px;transition:width .25s linear}
/* prayer card swipe + focus */
.flash{touch-action:pan-y}
@keyframes slideInL{from{transform:translateX(60%) rotate(4deg);opacity:0}to{transform:none;opacity:1}}
@keyframes slideInR{from{transform:translateX(-60%) rotate(-4deg);opacity:0}to{transform:none;opacity:1}}
.flash.slide-in-l{animation:slideInL .34s cubic-bezier(.22,.61,.36,1)}
.flash.slide-in-r{animation:slideInR .34s cubic-bezier(.22,.61,.36,1)}
.prayfocus{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#2D4C73,#16294a);display:flex;flex-direction:column;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.pf-close{position:fixed;top:calc(env(safe-area-inset-top) + 12px);right:16px;z-index:2;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.10);border:1px solid rgba(228,201,122,.35);color:#E4C97A;border-radius:99px;padding:8px 14px 8px 10px;font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:13px}
.pf-close .ic-svg{width:16px;height:16px;transform:rotate(90deg)}
.flash.focus{width:100%;max-width:none;flex:1;min-height:0;margin:0;border-radius:0;background:none;box-shadow:none;
  padding:calc(env(safe-area-inset-top) + 62px) 24px calc(env(safe-area-inset-bottom) + 40px);
  display:flex;flex-direction:column;overflow:auto}
.flash.focus .fl-wm{width:180px;height:180px;top:calc(env(safe-area-inset-top) + 6px);right:-24px;opacity:.09}
.flash.focus .fbook{top:calc(env(safe-area-inset-top) + 18px);right:96px}
.flash.focus .fn{font-size:34px;margin:12px 0 6px;line-height:1.12}
.flash.focus .fh{font-size:13px;letter-spacing:.2em}
.flash.focus li{font-size:17px;padding:12px 0}
.flash.focus .fverse{font-size:19px;margin-top:22px;padding-top:18px}
.flash.focus .prayrow{margin-top:8px;padding-bottom:6px}
.flash.focus .ptimer{margin-top:18px}
.pf-hint{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 6px);text-align:center;font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;color:rgba(255,255,255,.42);pointer-events:none}
/* backup expiry warning */
.bkwarn{position:fixed;inset:0;z-index:300;background:rgba(20,28,42,.72);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:22px;animation:fadeIn .18s ease}
.bw-card{background:var(--card);border-radius:18px;padding:26px 22px 18px;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.35);text-align:center}
.bw-ic{width:58px;height:58px;margin:0 auto 14px;border-radius:50%;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center}
.bw-ic.bad{background:#F6E7E5;color:#B4544F}
.bw-ic .ic-svg{width:26px;height:26px}
.bw-t{font-family:"Playfair Display",serif;font-weight:600;font-size:23px;color:var(--text)}
.bw-b{font-size:15px;line-height:1.55;color:var(--text2);margin-top:8px}
.bw-steps{display:flex;flex-direction:column;gap:8px;margin-top:18px}
.bw-steps .btn{width:100%;text-align:center;padding:13px}
.bw-msg{min-height:16px;margin-top:8px;color:var(--accent)}
.bw-later{margin-top:10px;background:none;border:none;color:var(--text2);font-family:"Nunito Sans",sans-serif;font-size:13px;padding:8px;cursor:pointer;text-decoration:underline}
/* new-build banner */
.updbar{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 74px);z-index:250;background:linear-gradient(155deg,#2D4C73,#22385c);color:#fff;border-radius:14px;padding:13px 14px 13px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 26px rgba(20,32,50,.35);font-family:"Nunito Sans",sans-serif;font-size:14px;animation:fadeIn .25s ease}
.updbar span{flex:1}
.updbar button{background:var(--gold);color:#1b2d49;border:none;border-radius:9px;padding:9px 15px;font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:13.5px}
/* ===== Batch F — Study dashboard ===== */
.studyhero{position:relative;overflow:hidden;padding:22px 20px 20px}
.studyhero .sy-wm{position:absolute;top:8px;right:-6px;width:118px;height:118px;color:var(--gold);opacity:.5;pointer-events:none}
.studyhero .sy-wm svg{width:100%;height:100%}
.sy-eyebrow{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text2);position:relative;z-index:1}
.sy-title{font-family:"Playfair Display",serif;font-weight:600;font-size:32px;letter-spacing:.01em;color:var(--blue);margin:6px 0 10px;position:relative;z-index:1;text-transform:uppercase;line-height:1.05}
.sy-week{display:flex;align-items:center;gap:7px;position:relative;z-index:1}
.sy-week .sw-lbl{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.sy-week .sw-num{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text);margin-top:2px}
.sy-week .sw-num .ic-svg{width:15px;height:15px;color:var(--gold)}
.sy-prog{margin-top:16px;position:relative;z-index:1}
.sy-prog .sp-top{display:flex;align-items:baseline;justify-content:space-between}
.sy-prog .sp-lbl{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
.sy-prog .sp-pct{font-family:"Playfair Display",serif;font-weight:700;font-size:20px;color:var(--blue)}
.sy-prog .sp-sub{font-size:14px;color:var(--text);margin-top:3px}
.sy-bar{height:8px;border-radius:99px;background:var(--tint);overflow:hidden;margin-top:9px}
.sy-bar span{display:block;height:100%;background:linear-gradient(90deg,#2D4C73,#3a5f8a);border-radius:99px}
.sy-cta{margin-top:16px;position:relative;z-index:1}
.sy-cta .btn{width:100%;text-align:center;padding:15px;font-size:15px}
/* roadmap */
.rm-head{background:linear-gradient(155deg,#2D4C73,#1d3251);border-radius:14px 14px 0 0;padding:14px 18px;text-align:center;margin:0 -1px}
.rm-head .rh-t{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.rmcard .eyebrow-band{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);text-align:center;padding:2px 0 12px}
.rmstep{display:flex;align-items:flex-start;gap:14px;padding:14px 2px;position:relative;cursor:pointer}
.rmstep:not(:last-child){border-bottom:1px solid var(--div2)}
.rmstep .rs-mark{position:relative;flex:0 0 30px;display:flex;flex-direction:column;align-items:center}
.rmstep .rs-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:13px;flex:0 0 30px}
.rmstep .rs-dot.done{background:linear-gradient(155deg,#2D4C73,#22385c);color:#fff}
.rmstep .rs-dot.done .ic-svg{width:15px;height:15px}
.rmstep .rs-dot.current{border:2px solid var(--gold);color:var(--gold);background:var(--card)}
.rmstep .rs-dot.todo{border:1.5px solid var(--div);color:var(--text2);background:var(--card)}
.rmstep .rs-rail{position:absolute;top:30px;bottom:-14px;left:50%;width:1.5px;transform:translateX(-50%);background:var(--div2)}
.rmstep:last-child .rs-rail{display:none}
.rmstep.is-current{background:linear-gradient(90deg,rgba(212,175,55,.08),transparent);border-radius:10px}
.rmstep .rs-body{flex:1;min-width:0}
.rmstep .rs-t{font-family:"Playfair Display",serif;font-weight:600;font-size:16.5px;color:var(--text)}
.rmstep.is-current .rs-t{color:var(--blue)}
.rmstep .rs-d{font-size:13px;color:var(--text2);margin-top:2px}
.rmstep .rs-chev{color:var(--text2);font-size:20px;align-self:center}
/* coming next loop */
.loopcard{position:relative;overflow:hidden;display:flex;align-items:center;gap:15px}
.loop-orb{width:58px;height:58px;flex:0 0 58px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#Efdca8,#E4C97A);display:flex;align-items:center;justify-content:center;color:#1d3251;box-shadow:0 3px 10px rgba(212,175,55,.3)}
.loop-orb .ic-svg{width:26px;height:26px}
.loopcard .grow{min-width:0}
.loop-lbl{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.loop-kind{font-size:12.5px;color:var(--text2);margin-top:3px}
.loop-name{font-family:"Playfair Display",serif;font-weight:600;font-size:20px;color:var(--text);margin-top:1px}
.loopcard .achev{color:var(--text2);font-size:22px}
/* resource rows */
.resrow{display:flex;align-items:center;gap:14px;padding:13px 2px;cursor:pointer}
.resrow:not(:last-child){border-bottom:1px solid var(--div2)}
.res-ic{width:42px;height:42px;flex:0 0 42px;border-radius:11px;background:linear-gradient(155deg,#2D4C73,#22385c);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Playfair Display",serif;font-weight:700;font-size:18px}
.res-ic .ic-svg{width:20px;height:20px}
.resrow .grow{min-width:0}
.res-t{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:15px;color:var(--text)}
.res-s{font-size:12.5px;color:var(--text2);margin-top:1px}
.resrow .achev{color:var(--text2);font-size:20px}
/* build your position */
.bp-head{text-align:center;padding:4px 0 2px}
.bp-title{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--text);display:inline-flex;align-items:center;gap:10px}
.bp-title::after,.bp-title::before{content:"";width:22px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.bp-title::after{background:linear-gradient(90deg,var(--gold),transparent)}
.bp-sub{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:16px;color:var(--text2);text-align:center;margin:6px 0 14px;line-height:1.4}
.bprow{display:flex;align-items:center;gap:13px;padding:13px 2px;cursor:pointer}
.bprow:not(:last-child){border-bottom:1px solid var(--div2)}
.bp-ic{width:30px;flex:0 0 30px;color:var(--blue);display:flex;justify-content:center}
.bp-ic .ic-svg{width:19px;height:19px}
.bprow .grow{font-family:"Nunito Sans",sans-serif;font-weight:600;font-size:15px;color:var(--text)}
.bp-fill{width:7px;height:7px;border-radius:50%;background:var(--gold);flex:0 0 7px}
.bprow .achev{color:var(--text2);font-size:19px}
.bp-journal{margin-top:14px}
.bp-journal .btn{width:100%;text-align:center;padding:13px;border:1.5px solid var(--div);background:var(--card)}
/* rich text editor */
.rte-toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--div2)}
.rte-btn{min-width:34px;height:34px;padding:0 9px;border:1px solid var(--div);border-radius:8px;background:var(--card);color:var(--text);font-family:"Nunito Sans",sans-serif;font-size:14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.rte-btn:active{background:var(--tint)}
.rte-btn.i{font-style:italic;font-weight:500}
.rte-btn.u{text-decoration:underline;font-weight:500}
.rte-area{min-height:180px;border:1px solid var(--div);border-radius:12px;padding:14px;font-family:"Nunito Sans",sans-serif;font-size:15.5px;line-height:1.6;color:var(--text);background:var(--card);outline:none}
.rte-area:focus{border-color:var(--accent)}
.rte-area ul,.rte-area ol{margin:8px 0 8px 22px}
.rte-area li{margin:3px 0}
.rte-area:empty::before{content:attr(data-ph);color:var(--text2);font-style:italic}
.bp-view h4{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.bp-view .bpv-body{font-size:15px;line-height:1.6;margin-bottom:16px}
.bp-view .bpv-body ul,.bp-view .bpv-body ol{margin:6px 0 6px 22px}
.bp-view .bpv-empty{font-style:italic;color:var(--text2);font-size:14px;margin-bottom:16px}
/* Nave's sectioned list */
.nvsec{padding:11px 0}
.nvsec:not(:last-child){border-bottom:1px solid var(--div2)}
.nvsec-l{font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:14.5px;color:var(--text);line-height:1.35}
.nvsec-r{font-size:14px;color:var(--text2);margin-top:5px;line-height:1.7}
.nvsec-r .reflink{color:var(--accent);font-weight:600;text-decoration:none}
.nvmore{margin-top:6px}
.nvmore summary{cursor:pointer;font-family:"Nunito Sans",sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.06em;color:var(--accent);padding:12px 0 4px;list-style:none;text-align:center}
.nvmore summary::-webkit-details-marker{display:none}
.nvmore[open] summary{border-bottom:1px solid var(--div2);margin-bottom:2px}
.res-flash{animation:resflash 1.4s ease}
@keyframes resflash{0%{box-shadow:0 0 0 2px var(--gold)}60%{box-shadow:0 0 0 2px var(--gold)}100%{box-shadow:0 1px 2px rgba(32,33,36,.04)}}
/* devo progress ring */
.ring{display:flex;align-items:center;gap:16px}
.ring svg{width:76px;height:76px;flex:0 0 76px}
.ring .rn{font-family:"Playfair Display",serif;font-weight:700;font-size:24px;color:var(--text)}
.ring .rl{font-size:12.5px;color:var(--text2)}
@media (prefers-reduced-motion:no-preference){
  .view{animation:fade .3s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
}
</style>
</head>

const LOOP_TYPES=['doctrine','person','study','question'];

function questionCount(){ return (D.content&&D.content.questions?D.content.questions.length:0); }
function loopWeek(offset){ return weekOfYear()-1+(offset||0); }
// Absolute, never-resetting Monday-anchored week counter (weekOfYear() resets
// each January, which is fine for the display label but wrong for a cursor
// that must only ever move forward). Used only for rotation bookkeeping.
function absWeekIndex(d){
  d=d||new Date();
  const day=(d.getDay()+6)%7;
  const monday=new Date(d.getFullYear(),d.getMonth(),d.getDate()-day);
  return Math.floor((monday-DAY0)/604800000);
}
function poolFor(type){ return type==='doctrine'?DOCTRINE_POOL : type==='person'?PERSON_LOOP : type==='study'?STUDY_TOPICS : null; }
// Advance a pool's cursor by however many of its own weeks have elapsed since
// we last checked — this is what makes rollover happen "every Monday 12:01 AM
// regardless of subject state" without re-computing from scratch each time,
// so a manual skip() earlier in the week isn't undone by the next natural check.
function ensurePoolCursor(type, poolLen){
  const typeIdx=LOOP_TYPES.indexOf(type);
  const aw=absWeekIndex();
  const last=S.study.cursorAt[type];
  if(last===null){ S.study.cursorAt[type]=aw; save(); return; }
  if(aw>last){
    let turns=0;
    for(let x=last+1;x<=aw;x++){ if((((x%4)+4)%4)===typeIdx) turns++; }
    if(turns>0) S.study.cursor[type]=Math.min(poolLen-1, (S.study.cursor[type]||0)+turns);
    S.study.cursorAt[type]=aw;
    save();
  }
}
function subjectForWeek(w){
  const type=LOOP_TYPES[((w%4)+4)%4];
  if(type==='question'){
    const qs=D.content.questions||[];
    if(!qs.length) return {type,title:'',ref:'Q0',qidx:0,qrefs:[]};
    ensurePoolCursor('question', qs.length);
    const idx=Math.min(qs.length-1, S.study.cursor.question||0);
    const q=qs[idx];
    return {type,title:(q&&q.q)||String(q),ref:'Q'+idx,qidx:idx,qrefs:(q&&q.r)||[]};
  }
  const pool=poolFor(type);
  ensurePoolCursor(type, pool.length);
  const idx=Math.min(pool.length-1, S.study.cursor[type]||0);
  const key=pool[idx];
  return {type,title:titleCase(key),ref:key};
}
// Manual advance: moves only the CURRENT slot's pool forward, early. Nothing
// else changes — the subject just left stays saved at its own state in the
// Library, waiting for the loop (or the user) to come back to it.
function skipSubject(){
  const s=currentSubject();
  if(s.type==='question'){
    const qs=D.content.questions||[];
    S.study.cursor.question=Math.min(qs.length-1, (S.study.cursor.question||0)+1);
  } else {
    const pool=poolFor(s.type);
    S.study.cursor[s.type]=Math.min(pool.length-1, (S.study.cursor[s.type]||0)+1);
  }
  S.study.cursorAt[s.type]=absWeekIndex();
  save();
  setStudyView('home');
}
let libSubject=null;
function currentSubject(){ return libSubject || subjectForWeek(loopWeek(0)); }
function nextSubject(){ return subjectForWeek(loopWeek(1)); }
function subjectKey(s){ return s.type+':'+s.ref; }
function subjectSteps(s){ return (S.study.mastery[subjectKey(s)]||{}); }
function subjectDone(s){ const m=subjectSteps(s); let n=0; for(let i=0;i<8;i++) if(m[i]) n++; return n; }
function usesRoadmap(s){ return s.type!=='question'; }
function toggleStep(i){
  const s=currentSubject(), k=subjectKey(s);
  const m=S.study.mastery[k]=S.study.mastery[k]||{};
  m[i]=!m[i]; save();
}
function firstIncompleteStep(){ const m=subjectSteps(currentSubject()); for(let i=0;i<8;i++) if(!m[i]) return i; return 7; }
function subjectLabel(s){ return ({doctrine:'Doctrine of the Week',person:'Person of the Week',question:'Question of the Week',study:'Topic of the Week'})[s.type]; }
function positionKey(s){ return subjectKey(s); }
function isDefined(s){ return !!S.study.defined[subjectKey(s)]; }
function toggleDefined(s){ const k=subjectKey(s); if(S.study.defined[k]) delete S.study.defined[k]; else S.study.defined[k]=todayKey(); save(); }
function getPosition(s,field){ const p=S.study.position[positionKey(s)]||{}; return p[field]||''; }
function setPosition(s,field,html){ const k=positionKey(s); const p=S.study.position[k]=S.study.position[k]||{}; p[field]=html; save(); }

const D={}; // kjv, naves, plan, hymns, bios, content, strongs, webster:{}
async function j(u){ const r=await fetch(u); if(!r.ok) throw new Error(u); return r.json(); }
async function boot(){
  [D.plan,D.hymns,D.content,D.naves,D.kjv,D.bios] = await Promise.all([
    j('data/plan.json'), j('data/hymns.json'), j('data/content.json'),
    j('data/naves.json'), j('data/kjv.json'), j('data/bios.json')
  ]);
  if(!S.currentTopic) S.currentTopic = randNave('t');
  if(!S.currentCharacter) S.currentCharacter = randNave('c');
  // Seed each list exactly once. Without these flags, deliberately emptying a
  // list looks "unseeded" and the defaults get restored on next launch.
  if(!S.seeded) S.seeded={};
  if(!S.seeded.albums && !(S.albums&&S.albums.length)){ S.albums = SEED_ALBUMS.slice(); S.seeded.albums=1; }

const DAY0=new Date(2026,6,2); // Jul 2 2026 = plan index 0
function todayKey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dayIndexFor(date){ const a=new Date(date.getFullYear(),date.getMonth(),date.getDate()); return Math.round((a-DAY0)/86400000); }
function dateForIndex(i){ const d=new Date(DAY0); d.setDate(d.getDate()+i); return d; }

function weekOfYear(d){
  d=d||new Date();
  // Weeks run Monday–Sunday, so weekly content changes on Monday (not on
  // whatever weekday Jan 1 happened to fall on).
  const day=(d.getDay()+6)%7;                       // Mon=0 … Sun=6
  const monday=new Date(d.getFullYear(),d.getMonth(),d.getDate()-day);
  const jan1=new Date(monday.getFullYear(),0,1);
  const j=(jan1.getDay()+6)%7;
  const firstMonday=new Date(jan1.getFullYear(),0,1-j);
  return Math.min(52, Math.round((monday-firstMonday)/604800000)+1);
}

/* ---------- In-app scripture reader (uses bundled KJV) ---------- */
function parseRef(ref){
  const m=String(ref).trim().match(/^([1-3]?\s?[A-Za-z][A-Za-z. ]+?)\s+(\d+)(?::(\d+)(?:[-–—](\d+))?)?/);
  if(!m) return null;
  let book=m[1].trim().replace(/\.$/,'');
  const alias={Psalm:'Psalms','Song of Songs':'Song of Solomon','Song of Sol':'Song of Solomon','Canticles':'Song of Solomon',Rev:'Revelation'};
  if(alias[book]) book=alias[book];
  if(!D.kjv[book]){ const k=Object.keys(D.kjv).find(b=>b.toLowerCase()===book.toLowerCase()||b.toLowerCase().indexOf(book.toLowerCase())===0); if(k) book=k; else return null; }
  const ch=+m[2];
  const vStart=m[3]?+m[3]:null;
  const vEnd=m[4]?+m[4]:(m[3]?+m[3]:null);
  return {book, ch, vStart, vEnd};
}
function cleanKjv(t){ return esc(String(t||'')).replace(/\{([^}]*)\}/g,'<i>$1</i>'); }
function bibleAppUrl(ref){
  const m=String(ref).trim().match(/^([1-3]?\s?[A-Za-z][A-Za-z.\s]*?)\s+(\d+)(?::(\d+))?/);
  if(!m) return 'https://tecartabible.com/bible/'+encodeURIComponent(String(ref).trim());
  const book=m[1].trim().replace(/\.$/,''), ch=m[2], v=m[3];
  // Tecarta format: Book+Chapter:Verse — opens the Tecarta app on iOS, or the web Bible otherwise
  return 'https://tecartabible.com/bible/'+encodeURIComponent(book)+'+'+ch+(v?':'+v:'');
}
function openScripture(ref){ location.href = bibleAppUrl(ref); }
function refClick(ref){ return `onclick="openScripture('${String(ref).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"`; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
/* linkify a verbatim Nave's entry: stateful scan; keeps display text identical */
function navesSections(entry){
  const codeRe=new RegExp('\\b'+CODE_RE+'\\b');
  return entry.split('\n').map(l=>l.replace(/^-\s*/,'').trim()).filter(Boolean).map(line=>{
    const m=line.match(codeRe);
    if(m && m.index>0){
      let label=line.slice(0,m.index).trim().replace(/[,:;]\s*$/,'');
      const refs=line.slice(m.index).trim();
      return {label, refs};
    }
    return {label:line, refs:''};
  });
}
function navesAccordion(entry){
  const secs=navesSections(entry);
  const rowHTML=s=>`<div class="nvsec">
    ${s.label?`<div class="nvsec-l">${esc(s.label)}</div>`:''}
    ${s.refs?`<div class="nvsec-r">${linkifyNaves(s.refs)}</div>`:''}
  </div>`;
  const head=secs.slice(0,6), rest=secs.slice(6);
  let html=head.map(rowHTML).join('');
  if(rest.length){
    html+=`<details class="nvmore"><summary>Show all ${secs.length} sections</summary>${rest.map(rowHTML).join('')}</details>`;
  }
  return html;
}
function linkifyNaves(text){
  const tok=new RegExp('\\b'+CODE_RE+'\\b|\\d+(?::\\d+)?(?:[\\-–]\\d+(?::\\d+)?)?(?:,\\d+(?::\\d+)?(?:[\\-–]\\d+(?::\\d+)?)?)*','g');
  let out='', last=0, book=null, m;
  while((m=tok.exec(text))!==null){
    const gap=text.slice(last,m.index);
    out+=esc(gap);
    const t=m[0];
    if(BOOKMAP[t]){ // book code
      book=BOOKMAP[t];
      out+=esc(t);
    } else { // number cluster
      const glueOk = book && /^[\s;,]*(?:with|and|cf\.?|to)?[\s;,]*$/i.test(gap);
      const first = t.match(/^(\d+)(?::(\d+))?/);
      if(glueOk && first){
        out+='<a class="reflink" role="button" tabindex="0" '+refClick(book+' '+first[1]+(first[2]?':'+first[2]:''))+'>'+esc(t)+'</a>';
      } else { book=null; out+=esc(t); }
    }
    last=m.index+t.length;
  }
  out+=esc(text.slice(last));
  return out;
}
/* full-name refs like "Genesis 1:1-2:3", "Psalm 1", "1 Peter 3:18-20" */
function refLink(ref){
  return '<a class="reflink" role="button" tabindex="0" '+refClick(ref)+'>'+esc(ref)+'</a>';
}
function parseFullRef(ref){ // -> {book,ch,v} first verse of ref, book normalized to KJV key
  const m=String(ref).trim().match(/^([1-3]?\s?[A-Za-z][A-Za-z ]+?)\s+(\d+)(?::(\d+))?/);
  if(!m) return null;
  let book=m[1].trim();
  if(book==='Psalm') book='Psalms';
  if(book==='Song of Songs') book='Song of Solomon';
  if(!D.kjv[book]){ const k=Object.keys(D.kjv).find(b=>b.toLowerCase()===book.toLowerCase()); if(k) book=k; else return null; }
  return {book, ch:+m[2], v:m[3]?+m[3]:1};
}
function kjvText(book,ch,v){
  const B=D.kjv[book]; if(!B) return null;
  const C=B[ch-1]; if(!C) return null;
  return C[v-1]||null;
}
/* first reference in a Nave's entry -> {book,ch,v,label} */
function firstNaveRef(entry){
  const re=new RegExp('\\b('+CODE_RE+')\\s+(\\d+)(?::(\\d+))?');
  const m=entry.match(re);
  if(!m) return null;
  const book=BOOKMAP[m[1]]; if(!book) return null;
  const ch=+m[2], v=m[3]?+m[3]:1;
  return {book,ch,v,label:book+' '+ch+':'+v};
}

/* --- Private Gist sync --- */
const GIST_FILE='mywalk-backup.json';
async function gistApi(path,opts){
  const c=bkCfg();
  if(!c.token) throw new Error('No GitHub token saved.');
  const r=await fetch('https://api.github.com'+path, Object.assign({
    headers:{'Authorization':'Bearer '+c.token,'Accept':'application/vnd.github+json','Content-Type':'application/json'}
  }, opts||{}));
  if(!r.ok){
    if(r.status===401){ const x=bkCfg(); x.tokenBad=1; bkSave(x); throw new Error('Token rejected (401). Check the token and that it has "gist" scope.'); }
    if(r.status===404) throw new Error('Gist not found (404).');
    throw new Error('GitHub error '+r.status);
  }
  { const x=bkCfg(); if(x.tokenBad){ delete x.tokenBad; bkSave(x); } }
  return r.json();
}
async function gistPush(){
  const c=bkCfg();
  const body={ description:'MY WALK backup', files:{ [GIST_FILE]:{ content:JSON.stringify(backupSnapshot(),null,2) } } };
  let res;
  if(c.gistId){
    try{ res=await gistApi('/gists/'+c.gistId,{method:'PATCH',body:JSON.stringify(body)}); }
    catch(e){ if(/404/.test(e.message)){ res=await gistApi('/gists',{method:'POST',body:JSON.stringify(Object.assign({public:false},body))}); } else throw e; }
  } else {
    res=await gistApi('/gists',{method:'POST',body:JSON.stringify(Object.assign({public:false},body))});
  }
  const c2=bkCfg(); c2.gistId=res.id; c2.lastSync=Date.now(); bkSave(c2);
  return res.id;
}
async function gistPull(){
  const c=bkCfg();
  if(!c.gistId) throw new Error('No backup gist yet — back up once first.');
  const res=await gistApi('/gists/'+c.gistId);
  const f=res.files&&res.files[GIST_FILE];
  if(!f) throw new Error('Backup file missing from gist.');
  let content=f.content;
  if(f.truncated && f.raw_url){ content=await (await fetch(f.raw_url)).text(); }
  return JSON.parse(content);
}
// Auto-sync: runs on load and when the app is hidden, honoring the interval.
function bkDue(){
  const c=bkCfg();
  if(!c.token || !c.auto) return false;
  const days=c.everyDays||1;
  return !c.lastSync || (Date.now()-c.lastSync) >= days*86400000;
}
async function autoBackup(force){
  const c=bkCfg();
  if(!c.token || !c.auto) return;
  if(!force && !bkDue()) return;
  if(!navigator.onLine) return;                 // silently skip offline; retries later
  try{ await gistPush(); }catch(e){ console.warn('auto-backup failed',e.message);
    if(/401|rejected/i.test(e.message)) { try{ showBackupWarning(); }catch(_){} } }
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') autoBackup(); });

/* --- Backup health: warn loudly before the token expires or if backups stall --- */
const TOKEN_LIFE_DAYS=365;
function daysSince(ms){ return ms?Math.floor((Date.now()-ms)/86400000):null; }
function backupHealth(){
  const c=bkCfg();
  if(!c.token){
    // No backup configured. If there's real data to lose, say so.
    const hasData = (S.prayer&&S.prayer.headings&&S.prayer.headings.length) || Object.keys(S.reads||{}).length>3;
    return hasData ? {level:'unset', why:'Your prayer list and progress are only on this device. Set up backup so nothing is lost.'} : {level:'none'};
  }
  if(c.tokenBad) return {level:'expired', why:'Your GitHub token was rejected — it has expired or been revoked.'};
  const age=daysSince(c.tokenAdded);
  if(age!==null && age>=TOKEN_LIFE_DAYS) return {level:'expired', why:'Your GitHub token is about a year old and has likely expired.'};
  if(age!==null && age>=TOKEN_LIFE_DAYS-21) return {level:'soon', days:TOKEN_LIFE_DAYS-age, why:'Your GitHub token expires soon.'};
  const stale=daysSince(c.lastSync);
  if(c.auto && stale!==null && stale>=14) return {level:'stale', days:stale, why:'Your last successful backup was '+stale+' days ago.'};
  return {level:'ok'};
}
function bkSnoozed(){ const c=bkCfg(); return c.snooze && Date.now()<c.snooze; }
function snoozeWarning(days){ const c=bkCfg(); c.snooze=Date.now()+days*86400000; bkSave(c); const o=el('bkwarn'); if(o) o.remove(); }
function showBackupWarning(force){
  const h=backupHealth();
  if(!force){
    if(h.level==='ok'||h.level==='none') return;
    if(bkSnoozed()) return;
  }
  if(el('bkwarn')) return;
  const urgent = h.level==='expired';
  const unset = h.level==='unset';
  const o=document.createElement('div'); o.id='bkwarn'; o.className='bkwarn';
  o.innerHTML=`
    <div class="bw-card">
      <div class="bw-ic ${urgent?'bad':''}">${ic(urgent?'bell':(unset?'bookmark':'refresh'))}</div>
      <div class="bw-t">${urgent?'Backups Have Stopped':(unset?'No Backup Yet':'Backup Needs Attention')}</div>
      <div class="bw-b">${esc(h.why||'')}</div>
      <div class="bw-b" style="margin-top:10px">Create a new token on GitHub (Settings → Developer settings → Tokens (classic), <b>gist</b> scope only), then paste it below.</div>
      <div class="bw-steps">

      </div>
      <div class="bw-msg tiny" id="bw-msg"></div>
      <button class="bw-later" id="bw-later">Remind me in 3 days</button>
    </div>`;
  document.body.appendChild(o);
  const msg=t=>{ const m=el('bw-msg'); if(m) m.textContent=t||''; };
  el('bw-token').onclick=async()=>{
    const v=prompt('Paste your new GitHub token (gist scope):','');
    if(v===null||!v.trim()) return;
    const c=bkCfg(); c.token=v.trim(); c.tokenAdded=Date.now(); delete c.tokenBad; delete c.snooze; c.auto=true; bkSave(c);
    msg('Testing…');
    try{ await gistPush(); msg('Backed up. You are protected again.'); setTimeout(()=>{const x=el('bkwarn'); if(x) x.remove();},1200); }
    catch(e){ msg(e.message); }
  };
  el('bw-file').onclick=()=>{ exportBackupFile(); msg('Backup file saved.'); };
  el('bw-later').onclick=()=>snoozeWarning(3);
}

(function initEdgeSwipe(){
  const standalone = (window.navigator&&window.navigator.standalone===true) ||
    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
  if(!standalone) return;               // browser tabs already have the native back gesture
  let sx=0, sy=0, tracking=false; const EDGE=28, THRESH=64;
  document.addEventListener('touchstart',e=>{ const t=e.touches[0]; tracking=t.clientX<=EDGE; sx=t.clientX; sy=t.clientY; },{passive:true});
  document.addEventListener('touchend',e=>{ if(!tracking) return; tracking=false; const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=Math.abs(t.clientY-sy); if(dx>THRESH&&dy<60) history.back(); },{passive:true});
})();

function versePreview(txt,maxWords){
  const words=String(txt).trim().split(/\s+/);
  if(words.length<=maxWords) return {text:txt,cut:false};
  // try to cut at a natural phrase break (comma/semicolon/colon) within the first maxWords
  let best=-1;
  for(let i=0;i<maxWords&&i<words.length;i++){
    if(/[,;:]$/.test(words[i])) best=i;
  }
  const n = best>=3 ? best+1 : maxWords;
  return {text:words.slice(0,n).join(' ').replace(/[,;:]$/,'')+'\u2026', cut:true};
}

// Psalm: tracks the plan day; Psalm 119 split into 11 parts; wraps to Psalm 1
// after 150. Proverb: day of the month. NT teaching: one chapter a day through
// the Gospel discourses + the epistles (Revelation stays on the story side),
// looping. All three render as Tecarta scripture links like the rest of the app.
let _psalmSeq=null, _ntSeq=null;
function psalmSeq(){
  if(_psalmSeq) return _psalmSeq;
  const a=[];
  for(let n=1;n<=118;n++) a.push('Psalm '+n);
  for(let v=1;v<=161;v+=16) a.push('Psalm 119:'+v+'-'+(v+15));
  for(let n=120;n<=150;n++) a.push('Psalm '+n);
  _psalmSeq=a; return a;
}
function ntSeq(){
  if(_ntSeq) return _ntSeq;
  const a=[];
  const push=(book,chs)=>chs.forEach(c=>a.push(book+' '+c));
  const range=(book,n)=>{ for(let c=1;c<=n;c++) a.push(book+' '+c); };
  // Gospel teaching chapters
  push('Matthew',[5,6,7,10,13,18,23,24,25]);
  push('Mark',[4,13]);
  push('Luke',[6,10,12,14,15,16,18,21]);
  push('John',[3,6,10,13,14,15,16,17]);
  // Epistles: Romans -> Jude (Revelation excluded, kept on the story side)
  range('Romans',16); range('1 Corinthians',16); range('2 Corinthians',13);
  range('Galatians',6); range('Ephesians',6); range('Philippians',4); range('Colossians',4);
  range('1 Thessalonians',5); range('2 Thessalonians',3);
  range('1 Timothy',6); range('2 Timothy',4); range('Titus',3); range('Philemon',1);
  range('Hebrews',13); range('James',5); range('1 Peter',5); range('2 Peter',3);
  range('1 John',5); range('2 John',1); range('3 John',1); range('Jude',1);
  _ntSeq=a; return a;
}
function companionFor(dayIndex, date){
  const ps=psalmSeq(), nt=ntSeq();
  const psalm=ps[((dayIndex%ps.length)+ps.length)%ps.length];
  const dom=Math.min(31,Math.max(1,date.getDate()));
  const ntref=nt[((dayIndex%nt.length)+nt.length)%nt.length];
  return [psalm, 'Proverbs '+dom, ntref];
}

function renderCal(sel){
  const selDate=dateForIndex(sel);
  const y=selDate.getFullYear(), m=selDate.getMonth();
  const first=new Date(y,m,1), start=first.getDay(), dim=new Date(y,m+1,0).getDate();
  const tk=calendarDay();
  let cells='<div class="cal">'+['S','M','T','W','T','F','S'].map(d=>`<div class="hd">${d}</div>`).join('');
  for(let i=0;i<start;i++) cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const idx=dayIndexFor(new Date(y,m,d));
    const has=idx>=0&&idx<D.plan.length;
    const isSel=idx===sel;
    const cls='d'+(has?' has':'')+(has&&S.reads[idx]?' read':'')+(has&&idx===tk?' today':'')+(isSel&&!S.reads[idx]?' sel':'');
    const dot = has&&!S.reads[idx] ? '<span class="cdot"></span>' : '';
    cells+=`<div class="${cls}" ${has?`role="button" tabindex="0" onclick="devoDay=${idx};renderDevo()"`:''}>${d}${dot}</div>`;
  }
  cells+='</div>';
  return `<div class="calhead">
    <button class="calnav" onclick="calMove(${sel},-1)" aria-label="Previous month">‹</button>
    <div class="cm">${selDate.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</div>
    <button class="calnav" onclick="calMove(${sel},1)" aria-label="Next month">›</button></div>`+cells;
}
function calMove(sel,dir){
  const d=dateForIndex(sel); d.setMonth(d.getMonth()+dir,15);
  devoDay=clampDay(dayIndexFor(d)); renderDevo();
}

function importList(kind){
  const m=modal(`<h3 class="mb">Paste ${kind==='albums'?'album':'sermon'} list</h3>
    <div class="small mb">One per line. "Artist — Title" or plain titles both work; any http link on a line is kept as its link.</div>
    <textarea id="imp" rows="10"></textarea><div class="mt"></div>
    <button class="btn solid" id="imp-go">Import</button>`);
  m.querySelector('#imp-go').onclick=()=>{
    const lines=m.querySelector('#imp').value.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
    const items=lines.map(l=>{
      const um=l.match(/https?:\/\/\S+/); const u=um?um[0]:'';
      let rest=l.replace(/https?:\/\/\S+/,'').replace(/[|\s]+$/,'').trim();
      rest=rest.replace(/^\d+[\.\)]\s*/,'').replace(/^[-*•]\s*/,'');
      const parts=rest.split(/\s+[—–]\s+| - /);
      if(kind==='albums'&&parts.length>=2) return {a:parts[0].trim(),t:parts.slice(1).join(' — ').trim(),u};
      return kind==='albums'?{t:rest,a:'',u}:{t:rest,u};
    }).filter(x=>x.t);
    S[kind]=S[kind].concat(items); save(); m.remove();
    kind==='albums'?renderAlbums():renderSermons();
  };
}

function fmtClock(s){ const m=Math.floor(s/60), r=s%60; return m+':'+String(r).padStart(2,'0'); }

/* ---------- "Each" timer: split a duration across a card's requests ---------- */
let eachTimerId=null, eachEnd=0, eachSegDur=0, eachQueue=[], eachIdx=0, eachCurrentId=null, eachItemId=null;
function strikesToday(){ return S.prayerStrikes[todayKey()]||[]; }
function addStrike(rid){
  const k=todayKey();
  const arr=(S.prayerStrikes[k]=S.prayerStrikes[k]||[]);
  if(!arr.includes(rid)){ arr.push(rid); save(); }
}
function strikeRequest(e,rid){
  if(e){ e.stopPropagation(); }
  if(strikesToday().includes(rid)) return;   // strikes are one-way until midnight
  addStrike(rid);
  if(eachTimerId && eachCurrentId===rid){ eachNextSegment(); return; }
  prayRerender();
}
function findItem(itemId){
  if(!S.prayer||!S.prayer.headings) return null;
  for(const hd of S.prayer.headings){ const it=hd.items.find(x=>x.id===itemId); if(it) return it; }
  return null;
}
function startEachTimer(totalSec,itemId){
  stopPrayTimer(true); stopEachTimer(true);
  const it=findItem(itemId); if(!it) return;
  const struck=strikesToday();
  eachQueue=it.requests.filter(r=>!struck.includes(r.id)).map(r=>r.id);
  if(eachQueue.length<2) return;
  eachItemId=itemId;
  eachSegDur=Math.max(3,Math.round(totalSec/eachQueue.length));
  eachIdx=0;
  unlockChime();
  runEachSegment();
}
function startEachTimerCustom(itemId){
  const v=prompt('Total time for this card \u2014 minutes (e.g. 3 or 1.5):','3');
  if(v===null) return;
  const mins=parseFloat(v); if(isNaN(mins)||mins<=0||mins>60) return;
  startEachTimer(Math.round(mins*60),itemId);
}
function runEachSegment(){
  if(eachIdx>=eachQueue.length){ stopEachTimer(); return; }
  eachCurrentId=eachQueue[eachIdx];
  eachEnd=Date.now()+eachSegDur*1000;
  if(eachTimerId){ clearInterval(eachTimerId); }
  eachTimerId=setInterval(()=>{
    const left=Math.max(0,Math.ceil((eachEnd-Date.now())/1000));
    const cd=el('pt-count'), bar=el('pt-bar');
    if(cd) cd.textContent=fmtClock(left);
    if(bar) bar.style.width=(eachSegDur?Math.round(100*left/eachSegDur):0)+'%';
    if(left<=0){ addStrike(eachCurrentId); eachNextSegment(); }
  },250);
  prayRerender();
}
function eachNextSegment(){
  prayChime();
  if(eachTimerId){ clearInterval(eachTimerId); eachTimerId=null; }
  eachIdx++;
  // skip anything struck by hand while the timer ran
  const struck=strikesToday();
  while(eachIdx<eachQueue.length && struck.includes(eachQueue[eachIdx])) eachIdx++;
  if(eachIdx>=eachQueue.length){ stopEachTimer(); return; }  // card sits; user taps Prayed
  runEachSegment();
}
function stopEachTimer(silent){
  if(eachTimerId){ clearInterval(eachTimerId); eachTimerId=null; }
  eachEnd=0; eachSegDur=0; eachQueue=[]; eachIdx=0; eachCurrentId=null; eachItemId=null;
  if(!silent) prayRerender();
}
let _chimeEl=null, _chimeUri=null;
function makeChimeUri(){
  if(_chimeUri) return _chimeUri;
  const sr=44100, dur=1.9, n=Math.floor(sr*dur);
  const partials=[[528,1],[792,0.5],[1056,0.26]];
  const buf=new ArrayBuffer(44+n*2), dv=new DataView(buf);
  function ws(o,s){for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF'); dv.setUint32(4,36+n*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
  dv.setUint32(24,sr,true); dv.setUint32(28,sr*2,true); dv.setUint16(32,2,true); dv.setUint16(34,16,true);
  ws(36,'data'); dv.setUint32(40,n*2,true);
  for(let i=0;i<n;i++){
    const t=i/sr;
    const env=Math.exp(-2.6*t)*(1-Math.exp(-45*t));
    let s=0; for(const p of partials) s+=p[1]*Math.sin(2*Math.PI*p[0]*t);
    s=Math.max(-1,Math.min(1,(s/1.76)*env*0.6));
    dv.setInt16(44+i*2, s*32767, true);
  }
  const bytes=new Uint8Array(buf); let bin=''; const ch=0x8000;
  for(let i=0;i<bytes.length;i+=ch) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch));
  _chimeUri='data:audio/wav;base64,'+btoa(bin);
  return _chimeUri;
}
function getChime(){ if(!_chimeEl){ _chimeEl=new Audio(makeChimeUri()); _chimeEl.preload='auto'; } return _chimeEl; }
function unlockChime(){ try{ const a=getChime(); a.volume=0; const p=a.play(); if(p&&p.then) p.then(()=>{a.pause();a.currentTime=0;a.volume=1;}).catch(()=>{a.volume=1;}); }catch(e){} }
function prayChime(){
  try{ const a=getChime(); a.currentTime=0; a.volume=1; const p=a.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){}
  try{ if(navigator.vibrate) navigator.vibrate([50,70,50]); }catch(e){} // no-op on iOS Safari
}

function mountPraySwipe(id){
  const card=el(id); if(!card) return;
  let sx=0, sy=0, dragging=false;
  card.addEventListener('touchstart',e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; dragging=true; prayDragMoved=false; card.style.transition='none'; },{passive:true});
  card.addEventListener('touchmove',e=>{ if(!dragging) return; const t=e.touches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)){ if(Math.abs(dx)>6) prayDragMoved=true;
      card.style.transform='translateX('+dx+'px) rotate('+(dx*0.02)+'deg)';
      card.style.opacity=String(Math.max(.55,1-Math.abs(dx)/500)); } },{passive:true});
  card.addEventListener('touchend',e=>{ if(!dragging) return; dragging=false;
    const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    card.style.transition='transform .32s cubic-bezier(.22,.61,.36,1), opacity .32s';
    if(Math.abs(dx)>70 && Math.abs(dx)>Math.abs(dy)){
      const dir=dx<0?1:-1;
      card.style.transform='translateX('+(dx<0?-1:1)*120+'%) rotate('+(dx<0?-1:1)*6+'deg)';
      card.style.opacity='0';
      setTimeout(()=>prayAdvance(dir),200);
    } else { card.style.transform=''; card.style.opacity='1'; setTimeout(()=>{prayDragMoved=false;},60); }
  },{passive:true});
}

function rteHTML(id, placeholder){

  </div>

function mountRte(id, initial){
  const area=el(id); if(!area) return;
  area.innerHTML=initial||rteStore[id]||'';
  area.addEventListener('input',()=>{ rteStore[id]=area.innerHTML; });
  area.addEventListener('keydown',e=>{
    if(!(e.metaKey||e.ctrlKey)) return;
    const k=e.key.toLowerCase();
    const map={b:'bold',i:'italic',u:'underline'};
    if(map[k]){ e.preventDefault(); try{ document.execCommand(map[k],false,null); }catch(_){}
      rteStore[id]=area.innerHTML; }
  });
  rteStore[id]=area.innerHTML;
}
function rteCmd(ev, cmd){
  ev.preventDefault(); // keep selection/focus in the editable area
  try{ document.execCommand(cmd,false,null); }catch(e){}
  const bar=ev.target.closest('.rte-toolbar'); if(bar){ const id=bar.getAttribute('data-for'); const a=el(id); if(a) rteStore[id]=a.innerHTML; }
}
function saveRte(id){ const a=el(id); if(a) rteStore[id]=a.innerHTML; }
function relatedTopics(entry){
  const m=[...entry.matchAll(/-See ([A-Z][A-Z0-9 ,'\-]+)/g)].map(x=>x[1].trim());
  const seen=new Set(); const out=[];
  for(const s of m){ const k=s.replace(/\s+/g,' ').trim(); if(k&&!seen.has(k)&&k.length<26){ seen.add(k); out.push(k);} }
  return out.slice(0,8);
}
function firstSentence(entry){
  // Only treat a genuine parenthetical opening line as the Nave's definition
  const first=entry.split('\n').map(l=>l.replace(/^-\s*/,'').trim()).find(Boolean)||'';
  if(first.startsWith('(')){
    let s=first;
    if(s.length>320){ s=s.slice(0,318); const sp=s.lastIndexOf(' '); if(sp>240) s=s.slice(0,sp); s+='…'; }
    return s;
  }
  return ''; // no real definition in Nave's — caller falls back to Webster's 1828
}

function keyVerses(entry,max){
  // pull first N linkable refs from the nave entry
  const re=new RegExp('\\b('+CODE_RE+')\\s+(\\d+)(?::(\\d+))?','g');
  const out=[]; let m;
  while((m=re.exec(entry))!==null && out.length<(max||4)){
    const book=BOOKMAP[m[1]]; if(!book) continue;
    const ch=+m[2], v=m[3]?+m[3]:1;

    if(!out.some(o=>o.ref===ref)){ const txt=kjvText(book,ch,v)||''; out.push({ref,txt}); }
  }
  return out;
}

    <button class="${browseKind==='t'?'on':''}" onclick="browseKind='t';studyBrowse()">Topics</button>
    <button class="${browseKind==='c'?'on':''}" onclick="browseKind='c';studyBrowse()">Characters</button>
    <button class="${browseKind==='p'?'on':''}" onclick="browseKind='p';studyBrowse()">Places</button>
  </div>
  <div id="br-r"></div>`;
  const inp=el('br-q'), rbox=el('br-r');
  function run(){
    const q=(inp.value||'').trim().toUpperCase(); browseQ=inp.value;
    if(q.length<1){
      rbox.innerHTML=`
      <div class="card">
        <div class="eyebrow mb">Browse All Entries</div>
        <div class="li tap" onclick="browseKind='t';studyBrowse()"><div class="grow"><div style="font-weight:600">Topics</div><div class="tiny">3,419 entries</div></div><div class="go">›</div></div>
        <div class="li tap" onclick="browseKind='c';studyBrowse()"><div class="grow"><div style="font-weight:600">Characters</div><div class="tiny">1,370 entries</div></div><div class="go">›</div></div>
        <div class="li tap" onclick="browseKind='p';studyBrowse()"><div class="grow"><div style="font-weight:600">Places</div><div class="tiny">530 entries</div></div><div class="go">›</div></div>
      </div>
      ${recent.length?`<div class="card"><div class="eyebrow mb">Recently Viewed</div>${recent.map(i=>{const x=D.naves[i];if(!x)return'';return `<div class="li tap" onclick="pickNave(${i})"><div class="grow">${esc(titleCase(x.s))}</div><div class="tiny">${x.k==='c'?'Character':x.k==='p'?'Place':'Topic'}</div></div>`;}).join('')}</div>`:''}
      <div class="card"><div class="eyebrow mb">Popular Topics</div>${popular.map(p=>`<div class="li tap" onclick="jumpTopic('${p}')"><div class="grow">${esc(titleCase(p))}</div><div class="go">›</div></div>`).join('')}</div>`;
      return;
    }
    const hits=[];
    for(let i=0;i<D.naves.length&&hits.length<80;i++){
      const x=D.naves[i];
      if(browseKind!=='all'&&x.k!==browseKind) continue;
      if(x.s.indexOf(q)>=0) hits.push(i);
    }
    rbox.innerHTML=`<div class="card" style="padding:6px 12px">${hits.map(i=>{
      const x=D.naves[i];
      return `<div class="li tap" onclick="pickNave(${i})"><div class="pill">${x.k==='c'?'Char':x.k==='p'?'Place':'Topic'}</div><div class="grow">${esc(titleCase(x.s))}</div><div class="go">›</div></div>`;
    }).join('')||'<p class="small" style="padding:10px 0">No matches.</p>'}</div>`;
  }
  inp.addEventListener('input',run);
  run();
  if(browseQ) inp.focus();
}
function pickNave(i){
  const x=D.naves[i];
  S.recentStudy=[i].concat((S.recentStudy||[]).filter(j=>j!==i)).slice(0,8);
  if(x.k==='c'){ S.currentCharacter=i; save(); setStudyView('character'); }
  else { S.currentTopic=i; S.memProgress={}; save(); setStudyView('topic'); }
}

/* ---------- service worker + boot ---------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js?v=49').then(reg=>{
    // Tell the user when a newer build is ready — one tap, no deleting the app.
    function watch(w){ if(!w) return;
      w.addEventListener('statechange',()=>{ if(w.state==='installed' && navigator.serviceWorker.controller) showUpdateBanner(reg); }); }
    if(reg.waiting && navigator.serviceWorker.controller) showUpdateBanner(reg);
    watch(reg.installing);
    reg.addEventListener('updatefound',()=>watch(reg.installing));
    // Check for a new build every time the app is opened/resumed.
    reg.update().catch(()=>{});
    document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') reg.update().catch(()=>{}); });
  }).catch(()=>{});
  let reloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(reloaded) return; reloaded=true; location.reload(); });
}
function showUpdateBanner(reg){
  if(document.getElementById('updbar')) return;
  const b=document.createElement('div'); b.id='updbar'; b.className='updbar';
  b.innerHTML=`<span>A new version of MY WALK is ready.</span><button id="upd-go">Update</button>`;
  document.body.appendChild(b);
  document.getElementById('upd-go').onclick=()=>{
    const w=reg.waiting||reg.installing;
    if(w){ w.postMessage('skipWaiting'); } else { location.reload(); }
  };
}
boot().catch(e=>{ APP.innerHTML='<div class="loading">Could not load data files.<br>'+esc(e.message)+'</div>'; });

</script>
</body>
